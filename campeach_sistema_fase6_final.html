/* ============================================================
   CAMPEACH RD — DESIGN SYSTEM
   v1.0 · Fase 1
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap');

/* ── TOKENS ────────────────────────────────────────────────── */
:root {
  /* Brand */
  --teal-50:  #f0faf9;
  --teal-100: #d5f2ef;
  --teal-200: #aae5e0;
  --teal-400: #01a1aa;
  --teal-500: #007a82;
  --teal-600: #005a60;
  --teal-700: #003d42;

  --amber-50:  #fffbf0;
  --amber-100: #fef0cc;
  --amber-400: #ff9820;
  --amber-500: #e07800;
  --amber-600: #b05e00;

  --green-50:  #f0faf5;
  --green-400: #1d9e75;
  --green-500: #0f6e56;

  --red-50:   #fef2f0;
  --red-400:  #c94a2a;
  --red-500:  #a33520;

  --purple-50:  #f5f3ff;
  --purple-400: #6b5ce7;
  --purple-500: #4a42b0;

  /* Neutrals */
  --ink-900: #111110;
  --ink-800: #1c1c1a;
  --ink-700: #2d2d2b;
  --ink-600: #454542;
  --ink-500: #6b6b68;
  --ink-400: #909088;
  --ink-300: #b8b8b2;
  --ink-200: #d8d8d2;
  --ink-100: #ececea;
  --ink-50:  #f7f6f3;
  --ink-25:  #fbfaf8;

  /* Semantic */
  --bg:           #f7f6f3;
  --bg-card:      #ffffff;
  --bg-sidebar:   #111110;
  --bg-topbar:    #ffffff;
  --border:       rgba(0,0,0,0.07);
  --border-strong: rgba(0,0,0,0.12);
  --shadow-sm:    0 1px 2px rgba(0,0,0,0.04), 0 1px 6px rgba(0,0,0,0.03);
  --shadow-md:    0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg:    0 12px 40px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.06);
  --shadow-xl:    0 24px 64px rgba(0,0,0,0.14), 0 8px 24px rgba(0,0,0,0.08);

  /* Typography */
  --font-display: 'Fraunces', Georgia, serif;
  --font-body:    'DM Sans', -apple-system, sans-serif;

  /* Spacing */
  --sidebar-w:    240px;
  --topbar-h:     60px;
  --radius-sm:    6px;
  --radius-md:    10px;
  --radius-lg:    14px;
  --radius-xl:    20px;

  /* Transitions */
  --t-fast:   120ms cubic-bezier(0.16,1,0.3,1);
  --t-med:    220ms cubic-bezier(0.16,1,0.3,1);
  --t-slow:   380ms cubic-bezier(0.16,1,0.3,1);
}

/* ── RESET ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink-800);
  line-height: 1.5;
  overflow-x: hidden;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }
img { max-width: 100%; }

/* ── SCROLLBAR ─────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--ink-200); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-300); }

/* ── APP SHELL ─────────────────────────────────────────────── */
.app-shell {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  grid-template-areas:
    "sidebar topbar"
    "sidebar content";
  min-height: 100vh;
}

/* ── SIDEBAR ───────────────────────────────────────────────── */
.sidebar {
  grid-area: sidebar;
  background: var(--bg-sidebar);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  display: flex;
  flex-direction: column;
  z-index: 100;
  overflow: hidden;
}

/* Logo */
.sidebar-logo {
  padding: 20px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  gap: 11px;
}
.sidebar-logo-mark {
  width: 34px; height: 34px;
  background: var(--teal-400);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.sidebar-logo-mark svg { width: 18px; height: 18px; }
.sidebar-logo-text { line-height: 1.2; }
.sidebar-logo-name {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  color: #ffffff;
  letter-spacing: -0.2px;
}
.sidebar-logo-tagline {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  font-weight: 500;
}

/* Nav */
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.sidebar-nav::-webkit-scrollbar { display: none; }

.nav-section-label {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.22);
  padding: 14px 10px 5px;
  margin-top: 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  color: rgba(255,255,255,0.55);
  font-size: 13px;
  font-weight: 450;
  transition: all var(--t-fast);
  position: relative;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.nav-item:hover {
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.85);
}
.nav-item.active {
  background: rgba(1,161,170,0.18);
  color: var(--teal-200);
}
.nav-item.active .nav-icon { color: var(--teal-400); }
.nav-icon {
  width: 16px; height: 16px;
  flex-shrink: 0;
  opacity: 0.7;
  transition: opacity var(--t-fast);
}
.nav-item.active .nav-icon,
.nav-item:hover .nav-icon { opacity: 1; }
.nav-badge {
  margin-left: auto;
  background: var(--amber-400);
  color: white;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 20px;
  min-width: 16px;
  text-align: center;
}
.nav-badge.teal { background: var(--teal-400); }

/* Sidebar footer */
.sidebar-footer {
  padding: 12px 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.sidebar-user {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--t-fast);
}
.sidebar-user:hover { background: rgba(255,255,255,0.06); }
.user-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--teal-500), var(--teal-400));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  color: white;
  flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name {
  font-size: 12.5px; font-weight: 500;
  color: rgba(255,255,255,0.85);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.user-role {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── TOPBAR ────────────────────────────────────────────────── */
.topbar {
  grid-area: topbar;
  position: sticky;
  top: 0;
  height: var(--topbar-h);
  background: var(--bg-topbar);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  z-index: 50;
  backdrop-filter: blur(8px);
}

.topbar-breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--ink-500);
  flex: 1;
}
.topbar-breadcrumb .page-title {
  font-weight: 600;
  color: var(--ink-800);
  font-size: 14px;
}
.topbar-breadcrumb .sep {
  color: var(--ink-300);
  font-size: 16px;
}

.topbar-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--ink-50);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 7px 12px;
  width: 240px;
  transition: all var(--t-fast);
}
.topbar-search:focus-within {
  border-color: var(--teal-400);
  background: white;
  box-shadow: 0 0 0 3px rgba(1,161,170,0.1);
  width: 300px;
}
.topbar-search input {
  border: none;
  background: none;
  font-size: 13px;
  color: var(--ink-700);
  outline: none;
  width: 100%;
}
.topbar-search input::placeholder { color: var(--ink-400); }
.topbar-search svg { width: 14px; height: 14px; color: var(--ink-400); flex-shrink: 0; }

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.topbar-icon-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: white;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-600);
  transition: all var(--t-fast);
  position: relative;
}
.topbar-icon-btn:hover {
  background: var(--ink-50);
  color: var(--ink-800);
  border-color: var(--border-strong);
}
.topbar-icon-btn svg { width: 16px; height: 16px; }
.notif-dot {
  position: absolute;
  top: 6px; right: 6px;
  width: 7px; height: 7px;
  background: var(--amber-400);
  border-radius: 50%;
  border: 1.5px solid white;
}

/* ── MAIN CONTENT ──────────────────────────────────────────── */
.main-content {
  grid-area: content;
  margin-left: var(--sidebar-w);
  min-height: calc(100vh - var(--topbar-h));
  padding: 28px;
  overflow-x: hidden;
}

/* ── PAGE HEADER ───────────────────────────────────────────── */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 16px;
}
.page-header-left {}
.page-header-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  color: var(--ink-900);
  letter-spacing: -0.5px;
  line-height: 1.2;
}
.page-header-sub {
  font-size: 13px;
  color: var(--ink-500);
  margin-top: 3px;
}
.page-header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* ── BUTTONS ───────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-body);
  border: 1px solid transparent;
  transition: all var(--t-fast);
  line-height: 1;
  white-space: nowrap;
}
.btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

.btn-primary {
  background: var(--teal-400);
  color: white;
  border-color: var(--teal-500);
  box-shadow: 0 1px 2px rgba(0,122,130,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
}
.btn-primary:hover:not(:disabled) {
  background: var(--teal-500);
  box-shadow: 0 3px 8px rgba(0,122,130,0.3);
  transform: translateY(-1px);
}
.btn-primary:active { transform: translateY(0); box-shadow: none; }

.btn-secondary {
  background: white;
  color: var(--ink-700);
  border-color: var(--border-strong);
  box-shadow: var(--shadow-sm);
}
.btn-secondary:hover:not(:disabled) {
  background: var(--ink-50);
  border-color: var(--ink-300);
}

.btn-ghost {
  background: transparent;
  color: var(--ink-600);
  border-color: transparent;
}
.btn-ghost:hover:not(:disabled) { background: var(--ink-100); color: var(--ink-800); }

.btn-danger {
  background: var(--red-50);
  color: var(--red-400);
  border-color: rgba(201,74,42,0.2);
}
.btn-danger:hover:not(:disabled) { background: var(--red-400); color: white; }

.btn-success {
  background: var(--green-50);
  color: var(--green-500);
  border-color: rgba(29,158,117,0.2);
}
.btn-success:hover:not(:disabled) { background: var(--green-400); color: white; }

.btn-wa {
  background: #25D366;
  color: white;
  border-color: #1da851;
}
.btn-wa:hover:not(:disabled) { background: #1da851; transform: translateY(-1px); }

.btn-pdf {
  background: var(--red-50);
  color: var(--red-400);
  border-color: rgba(201,74,42,0.2);
}
.btn-pdf:hover:not(:disabled) { background: var(--red-400); color: white; }

.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-lg { padding: 11px 22px; font-size: 14.5px; }
.btn-icon { padding: 8px; }
.btn-icon.btn-sm { padding: 6px; }

/* ── CARDS ─────────────────────────────────────────────────── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}
.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-800);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title svg { width: 16px; height: 16px; color: var(--teal-400); }
.card-subtitle { font-size: 12px; color: var(--ink-500); margin-top: 1px; }
.card-body { padding: 20px; }
.card-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  background: var(--ink-25);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
}

/* ── KPI CARDS ─────────────────────────────────────────────── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
  transition: all var(--t-med);
}
.kpi-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--kpi-color, var(--teal-400));
}
.kpi-card.amber { --kpi-color: var(--amber-400); }
.kpi-card.green { --kpi-color: var(--green-400); }
.kpi-card.red   { --kpi-color: var(--red-400); }
.kpi-card.purple { --kpi-color: var(--purple-400); }

.kpi-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--ink-500);
  margin-bottom: 8px;
}
.kpi-value {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--ink-900);
  line-height: 1;
  letter-spacing: -1px;
}
.kpi-meta {
  font-size: 12px;
  color: var(--ink-400);
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.kpi-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 7px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.kpi-badge.up { background: var(--green-50); color: var(--green-500); }
.kpi-badge.down { background: var(--red-50); color: var(--red-400); }
.kpi-icon {
  position: absolute;
  top: 18px; right: 18px;
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--kpi-color, var(--teal-400)) 12%, transparent);
  display: flex; align-items: center; justify-content: center;
}
.kpi-icon svg { width: 18px; height: 18px; color: var(--kpi-color, var(--teal-400)); }

/* ── GRIDS ─────────────────────────────────────────────────── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
.grid-7-3 { display: grid; grid-template-columns: 7fr 3fr; gap: 20px; }
.grid-6-4 { display: grid; grid-template-columns: 6fr 4fr; gap: 20px; }

/* ── TABLES ────────────────────────────────────────────────── */
.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  font-size: 13px;
}
.data-table thead tr {
  background: var(--ink-25);
  border-bottom: 1px solid var(--border);
}
.data-table th {
  padding: 11px 16px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--ink-500);
  white-space: nowrap;
}
.data-table th.sortable { cursor: pointer; user-select: none; }
.data-table th.sortable:hover { color: var(--teal-500); }
.data-table td {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--ink-700);
  vertical-align: middle;
}
.data-table tbody tr:last-child td { border-bottom: none; }
.data-table tbody tr { transition: background var(--t-fast); }
.data-table tbody tr:hover td { background: var(--ink-25); }
.data-table tbody tr.selected td { background: var(--teal-50); }

.td-main { font-weight: 500; color: var(--ink-900); }
.td-sub  { font-size: 11.5px; color: var(--ink-400); margin-top: 1px; }

/* ── BADGES / PILLS ────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11.5px;
  font-weight: 600;
  line-height: 1;
}
.badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; }
.badge-teal    { background: var(--teal-50);   color: var(--teal-600);  }
.badge-teal::before    { background: var(--teal-400); }
.badge-amber   { background: var(--amber-50);  color: var(--amber-600); }
.badge-amber::before   { background: var(--amber-400); }
.badge-green   { background: var(--green-50);  color: var(--green-500); }
.badge-green::before   { background: var(--green-400); }
.badge-red     { background: var(--red-50);    color: var(--red-400);   }
.badge-red::before     { background: var(--red-400); }
.badge-purple  { background: var(--purple-50); color: var(--purple-500); }
.badge-purple::before  { background: var(--purple-400); }
.badge-neutral { background: var(--ink-100);   color: var(--ink-600);   }
.badge-neutral::before { background: var(--ink-400); }

/* ── FORMS ─────────────────────────────────────────────────── */
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 12.5px; font-weight: 500; color: var(--ink-700); }
.form-label .required { color: var(--red-400); margin-left: 2px; }
.form-input,
.form-select,
.form-textarea {
  background: white;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  font-size: 13px;
  color: var(--ink-800);
  font-family: var(--font-body);
  transition: all var(--t-fast);
  outline: none;
  width: 100%;
}
.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  border-color: var(--teal-400);

    return dt.toLocaleDateString("es-DO", { day:"2-digit", month:"short", year:"numeric" });
  },
  fmtDateShort(d) {
    if (!d) return "—";
    const dt = new Date(d + "T00:00:00");
    return dt.toLocaleDateString("es-DO", { day:"2-digit", month:"short" });
  },
  etiquetaBadge(e) {
    const map = {
      "VIP":        "badge-purple",
      "Frecuente":  "badge-teal",
      "Activo":     "badge-green",
      "Nuevo":      "badge-amber",
      "Lead":       "badge-neutral",
      "Ocasional":  "badge-neutral",
    };
    return map[e] || "badge-neutral";
  },
  estadoBadge(e) {
    const map = {
      "Pagada":      "badge-green",
      "Pendiente":   "badge-amber",
      "Vencida":     "badge-red",
      "Cancelada":   "badge-neutral",
      "Reembolso":   "badge-red",
      "Enviada":     "badge-teal",
      "Borrador":    "badge-neutral",
      "En revisión": "badge-amber",
      "Confirmado":  "badge-green",
      "Cotizado":    "badge-teal",
      "Seguimiento": "badge-amber",
      "Consulta":    "badge-neutral",
      "Completado":  "badge-green",
      "Perdido":     "badge-red",
      "Activo":      "badge-green",
      "Lead":        "badge-neutral",
    };
    return map[e] || "badge-neutral";
  },
  avatarColor(nombre) {
    const colors = ["#01a1aa","#007a82","#1d9e75","#ff9820","#6b5ce7","#c94a2a","#e07800","#0f6e56"];
    let h = 0;
    for (let c of nombre) h = c.charCodeAt(0) + ((h << 5) - h);
    return colors[Math.abs(h) % colors.length];
  },
  initials(nombre) {
    return nombre.split(" ").slice(0,2).map(p=>p[0]).join("").toUpperCase();
  },
};

const App = {

  init() {

      { id:"whatsapp",     label:"Plantillas WA",     icon:"message-circle", badge:null },
      { section: "Operaciones" },
      { id:"campamentos",  label:"Campamentos",        icon:"map-pin",     badge:"24" },

      { id:"config",       label:"Configuración",      icon:"settings",    badge:null },
    ];

    const items = nav.map(item => {
      if (item.section !== undefined) {
        return item.section ? `<div class="nav-section-label">${item.section}</div>` : "";
      }
      const badge = item.badge
        ? `<span class="nav-badge ${item.badgeCls||""}">${item.badge}</span>`
        : "";
      return `
        <button class="nav-item" data-page="${item.id}" onclick="App.navigate('${item.id}',this)">
          ${iconSVG(item.icon, "nav-icon")}

        </button>`;
    }).join("");

    return `

          <div class="sidebar-logo-mark">
            ${iconSVG("tent","",18)}
          </div>
          <div class="sidebar-logo-text">

  renderTopbar() {
    return `
      <header class="topbar" id="topbar">
        <div class="topbar-breadcrumb">
          <span id="tb-section" style="color:var(--ink-400);font-size:12px"></span>

          <span class="page-title" id="tb-title">Dashboard</span>

          ${iconSVG("search")}
          <input type="text" id="global-search" placeholder="Buscar cliente, reserva, campamento…" autocomplete="off">
        </div>

        <div class="topbar-actions">
          <button class="btn btn-primary btn-sm" onclick="Pages.cotizaciones && Pages.cotizaciones.openNew ? Pages.cotizaciones.openNew() : App.navigate('cotizaciones')">
            ${iconSVG("plus")} Nueva cotización
          </button>
          <button class="topbar-icon-btn" data-tooltip="Notificaciones">
            ${iconSVG("bell")}
            <span class="notif-dot"></span>
          </button>
          <button class="topbar-icon-btn" data-tooltip="Ayuda">
            ${iconSVG("help-circle")}
          </button>
        </div>
      </header>`;
  },

  // ── NAVIGATION ────────────────────────────────────────────
  bindNav() {},

  navigate(pageId, btnEl) {
    this.currentPage = pageId;

    // Update active nav
    document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
    const activeBtn = btnEl || document.querySelector(`[data-page="${pageId}"]`);
    if (activeBtn) activeBtn.classList.add("active");

    // Update topbar
    const pageInfo = {
      dashboard:    { title:"Dashboard",          section:null },
      leads:        { title:"Leads & Pipeline",   section:"Ventas" },
      cotizaciones: { title:"Cotizaciones",        section:"Ventas" },
      reservas:     { title:"Reservas",            section:"Ventas" },
      facturas:     { title:"Facturas",            section:"Ventas" },
      clientes:     { title:"Clientes / CRM",     section:"Clientes" },
      whatsapp:     { title:"Plantillas WhatsApp", section:"Clientes" },
      campamentos:  { title:"Campamentos",         section:"Operaciones" },
      equipos:      { title:"Equipos de camping",  section:"Operaciones" },
      suplidores:   { title:"Suplidores",          section:"Operaciones" },
      pagos:        { title:"Pagos",               section:"Finanzas" },
      gastos:       { title:"Gastos",              section:"Finanzas" },
      reportes:     { title:"Reportes",            section:"Finanzas" },
      incidencias:  { title:"Incidencias",         section:"Sistema" },
      config:       { title:"Configuración",       section:"Sistema" },
    };
    const info = pageInfo[pageId] || { title: pageId, section: null };
    document.getElementById("tb-title").textContent = info.title;
    const secEl  = document.getElementById("tb-section");
    const sepEl  = document.getElementById("tb-sep");
    if (info.section) {
      secEl.textContent  = info.section;
      sepEl.style.display = "";
    } else {
      secEl.textContent  = "";
      sepEl.style.display = "none";
    }

    // Render page
    const main = document.getElementById("main-content");
    main.innerHTML = "";

    if (Pages[pageId]) {
      Pages[pageId].render(main);
    } else {
      main.innerHTML = this.renderComingSoon(info.title);
    }

    window.scrollTo(0, 0);
  },

  renderComingSoon(title) {
    return `
      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-header-title">${title}</h1>
          <p class="page-header-sub">Este módulo estará disponible en próximas fases</p>
        </div>
      </div>
      <div class="card">
        <div class="card-body">
          <div class="empty-state">
            ${iconSVG("clock","empty-icon-svg",32)}
            <div class="empty-title">En construcción</div>
            <p class="empty-desc">El módulo <strong>${title}</strong> se desarrollará en la siguiente fase. Los datos ya están listos.</p>
          </div>
        </div>
      </div>`;
  },

  // ── GLOBAL SEARCH ─────────────────────────────────────────
  initSearch() {
    const input = document.getElementById("global-search");
    if (!input) return;
    let debounce;
    input.addEventListener("input", e => {
      clearTimeout(debounce);
      debounce = setTimeout(() => this.doSearch(e.target.value.trim()), 220);
    });
  },

  doSearch(q) {
    if (!q || q.length < 2) return;
    // Navigate to most relevant page and filter
    const lower = q.toLowerCase();
    const clienteMatch = DB.clientes.find(c => c.nombre.toLowerCase().includes(lower));
    if (clienteMatch) {
      this.navigate("clientes");
      setTimeout(() => Pages.clientes && Pages.clientes.filter(q), 100);
    }
  },

  // ── TOAST NOTIFICATIONS ───────────────────────────────────
  toast(msg, type="success", duration=3500) {
    const icons = { success:"check-circle", error:"x-circle", warning:"alert-triangle", info:"info" };
    const container = document.getElementById("toast-container");
    const el = document.createElement("div");
    el.className = `toast ${type}`;
    el.innerHTML = `${iconSVG(icons[type]||"info")} <span>${msg}</span>`;
    container.appendChild(el);
    setTimeout(() => {
      el.style.opacity = "0";
      el.style.transform = "translateX(20px)";
      el.style.transition = "all 0.3s ease";
      setTimeout(() => el.remove(), 300);
    }, duration);
  },
};

  };
  const d = icons[name] || `<circle cx="12" cy="12" r="10"/>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${cls}">${d}</svg>`;
}

  // ── FORM LOGIC ──────────────────────────────────────────────
  bindFormEvents() {},

  onClienteChange(value) {
    this.draft.cliente = value;
    const found = DB.clientes.find(c=>c.nombre===value);
    if (found) {
      const telEl = document.getElementById("cot-tel");
      if (telEl && found.tel) telEl.value = found.tel;
      this.draft.tel = found.tel || "";
      this.draft.email = found.email || "";
    }
    this.updatePreview();
  },

  onCampChange(sel) {
    const opt = sel.selectedOptions[0];
    const precio = parseInt(opt?.dataset.precio)||0;
    this.draft.campamento = sel.selectedOptions[0]?.text || "";
    // Auto-fill precio in first linea if empty
    if (precio && !this.draft.lineas[0].precio) {
      this.draft.lineas[0].precio = precio;
      this.draft.lineas[0].desc = "Entrada camping adulto";
      this.draft.lineas[0].cant = this.draft.adultos;
      document.getElementById("cot-lineas").innerHTML = this.renderLineas();
    }
    this.updatePreview();
  },

  onFechaChange() {
    const fi = document.getElementById("cot-fecha")?.value;
    const fo = document.getElementById("cot-salida")?.value;
    this.draft.fechaEvento = fi||"";
    this.draft.fechaSalida = fo||"";
    if (fi && fo) {
      const d1 = new Date(fi), d2 = new Date(fo);
      const noches = Math.max(1, Math.round((d2-d1)/(1000*60*60*24)));
      this.draft.noches = noches;
      // Update días in lineas
      this.draft.lineas = this.draft.lineas.map(l=>({...l, dias:noches}));
      document.getElementById("cot-lineas").innerHTML = this.renderLineas();
    }
    this.updatePreview();
  },

  updateFromForm() {
    this.draft.adultos = parseInt(document.getElementById("cot-adultos")?.value)||2;
    this.draft.ninos   = parseInt(document.getElementById("cot-ninos")?.value)||0;
    this.draft.notas   = document.getElementById("cot-notas")?.value||"";
    this.updatePreview();
  },

  updateLinea(i, field, value) {
    this.draft.lineas[i][field] = value;
    const sub = document.getElementById(`cot-sub-${i}`);
    if (sub) sub.textContent = this.fmtLinea(this.draft.lineas[i]);
    this.updateTotals();
    this.updatePreview();
  },

  addLinea() {
    this.draft.lineas.push({ desc:"", cant:1, dias: this.draft.noches||1, precio:0, deposito:0 });
    document.getElementById("cot-lineas").innerHTML = this.renderLineas();
    this.updateTotals();
  },

  removeLinea(i) {
    if (this.draft.lineas.length <= 1) return;
    this.draft.lineas.splice(i, 1);
    document.getElementById("cot-lineas").innerHTML = this.renderLineas();
    this.updateTotals();
    this.updatePreview();
  },

  fmtLinea(l) {
    const sub = (l.cant||0) * (l.dias||1) * (l.precio||0);
    return sub > 0 ? "RD$"+sub.toLocaleString("es-DO") : "—";
  },

  getTotal() {
    return this.draft.lineas.reduce((s,l)=>s+(l.cant||1)*(l.dias||1)*(l.precio||0),0);
  },

  getTotalDeposito() {
    return this.draft.lineas.reduce((s,l)=>s+(l.deposito||0),0);
  },

  updateTotals() {
    const total = this.getTotal();
    const dep   = this.getTotalDeposito();
    const sEl = document.getElementById("cot-subtotal");
    const dEl = document.getElementById("cot-deposito-total");
    const tEl = document.getElementById("cot-total-display");
    if (sEl) sEl.textContent = DB.fmt(total);
    if (dEl) dEl.textContent = dep > 0 ? DB.fmt(dep) : "—";
    if (tEl) tEl.textContent = DB.fmt(total);
  },

  updatePreview() {
    this.updateTotals();
    const preview = document.getElementById("wa-preview-text");
    if (!preview) return;

    const nombre  = (document.getElementById("cot-nombre")?.value || this.draft.cliente || "").split(" ")[0] || "Cliente";
    const camp    = this.draft.campamento || document.getElementById("cot-camp")?.selectedOptions[0]?.text || "";
    const servicio= document.getElementById("cot-servicio")?.value || "";
    const adultos = parseInt(document.getElementById("cot-adultos")?.value)||2;
    const ninos   = parseInt(document.getElementById("cot-ninos")?.value)||0;
    const fecha   = this.draft.fechaEvento;
    const noches  = this.draft.noches||1;
    const total   = this.getTotal();
    const dep     = this.getTotalDeposito();
    const notas   = document.getElementById("cot-notas")?.value||"";

    if (!camp && !total) {
      preview.textContent = "Completa el formulario para generar el mensaje…";
      return;
    }

    let fechaStr = "";
    if (fecha) {
      const dt = new Date(fecha+"T00:00:00");
      fechaStr = dt.toLocaleDateString("es-DO",{day:"2-digit",month:"long",year:"numeric"});
    }

    const lineasStr = this.draft.lineas
      .filter(l=>l.desc&&l.precio>0)
      .map(l=>`  • ${l.desc}: ${DB.fmt((l.cant||1)*(l.dias||1)*(l.precio||0))}`)
      .join("\n");

    const msg = [
      `¡Hola ${nombre}! 😊`,
      "",
      `Te tengo lista tu cotización para *${camp || "[Campamento]"}* 🏕️`,
      "",
      `📋 *Resumen:*`,
      `👥 ${adultos} adulto${adultos>1?"s":""}${ninos>0?` + ${ninos} niño${ninos>1?"s":""}`:""}`,
      fechaStr ? `📅 Fecha: ${fechaStr}` : null,
      noches>1 ? `🌙 ${noches} noche${noches>1?"s":""}` : null,
      servicio ? `✨ Modalidad: ${servicio}` : null,
      lineasStr ? `\n*Detalle:*\n${lineasStr}` : null,
      "",
      total > 0 ? `💰 *Total: ${DB.fmt(total)}*` : null,
      dep > 0 ? `🔒 Depósito reembolsable: ${DB.fmt(dep)}` : null,
      "",
      `💳 *Transferencia a:*`,
      `🏦 Banco Popular 817906308`,
      `🏦 Banreservas 9600465807`,
      `A nombre de: Katherine Mella`,
      "",
      notas ? `📌 ${notas}\n` : null,
      `✅ Envíanos el comprobante y confirmamos tu reserva. ¡Te esperamos pronto! 🌿`,
    ].filter(l=>l!==null).join("\n");

    preview.textContent = msg;
    this.draft._wa_msg = msg;
  },

  copyWA() {
    const msg = this.draft._wa_msg || document.getElementById("wa-preview-text")?.textContent;
    if (!msg || msg.includes("Completa")) return App.toast("Genera el mensaje primero","warning");
    navigator.clipboard.writeText(msg).then(()=>App.toast("Mensaje copiado al portapapeles","success")).catch(()=>{
      const ta=document.createElement("textarea");ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
      App.toast("Mensaje copiado","success");
    });
  },

  sendWA() {
    this.updatePreview();
    const tel = (document.getElementById("cot-tel")?.value||"").replace(/\D/g,"");
    const msg = this.draft._wa_msg || document.getElementById("wa-preview-text")?.textContent;
    if (!msg || msg.includes("Completa")) return App.toast("Completa el formulario primero","warning");
    if (tel) {
      window.open(`https://wa.me/1${tel}?text=${encodeURIComponent(msg)}`, "_blank");
    } else {
      this.copyWA();

  calcAlquiler() {
    const sel = document.getElementById("al-equipo");
    const opt = sel?.selectedOptions[0];
    const precio  = parseFloat(opt?.dataset.precio||0);
    const deposito= parseFloat(opt?.dataset.dep||0);
    const cant    = parseInt(document.getElementById("al-cant")?.value||1);
    const fi = document.getElementById("al-salida")?.value;
    const fo = document.getElementById("al-retorno")?.value;
    let noches = 1;
    if (fi && fo) {
      const d1=new Date(fi), d2=new Date(fo);
      noches = Math.max(1, Math.round((d2-d1)/(1000*60*60*24)));
    }
    const total = precio * cant * noches;
    const dep   = deposito * cant;
    const nEl = document.getElementById("al-noches");
    const tEl = document.getElementById("al-total");
    const dEl = document.getElementById("al-deposito");
    if (nEl) nEl.textContent = noches + " noche" + (noches>1?"s":"");
    if (tEl) tEl.textContent = total > 0 ? DB.fmt(total) : "—";
    if (dEl) dEl.textContent = dep > 0 ? DB.fmt(dep) : "—";

  genWAEquipo() {
    const cliente = document.getElementById("al-cliente")?.value||"Cliente";

    navigator.clipboard?.writeText(msg).then(()=>App.toast("Mensaje copiado","success")).catch(()=>{});

  },

  guardarAlquiler() {
    const cliente = document.getElementById("al-cliente")?.value;

    const mes = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][new Date().getMonth()];
    const newG = {
      id: "G"+String(DB.gastos.length+1).padStart(3,"0"),

    };
    DB.gastos.unshift(newG);
    App.toast(`Gasto de ${DB.fmt(monto)} registrado en ${cat}`,"success");

    Pages.gastos.render(document.getElementById("main-content"));

Pages.whatsapp = {
  catActiva: "todas",
  templateActiva: null,
  camposForm: {},

  render(container) {
    const cats = ["todas", ...new Set(DB.waTemplates.map(t=>t.categoria))];
    const totalUsos = DB.waTemplates.reduce((s,t)=>s+t.usos,0);

    container.innerHTML = `
      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-header-title">Plantillas de WhatsApp</h1>
          <p class="page-header-sub">${DB.waTemplates.length} plantillas · ${totalUsos} usos totales · Personalizadas para CAMPEACH RD</p>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-primary btn-sm" onclick="Pages.whatsapp.openNueva()">
            ${iconSVG("plus")} Nueva plantilla
          </button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-bar mb-20">
        ${cats.filter(c=>c!=="todas").map(c=>{
          const ts=DB.waTemplates.filter(t=>t.categoria===c);
          return `<div class="stats-bar-item">
            <div class="stats-bar-label">${c}</div>
            <div class="stats-bar-value">${ts.length} plantilla${ts.length!==1?"s":""}</div>
          </div>`;
        }).join("")}
        <div class="stats-bar-item">
          <div class="stats-bar-label">Total usos</div>
          <div class="stats-bar-value" style="color:var(--teal-500)">${totalUsos}</div>
        </div>
      </div>

      <!-- Filtros por categoría -->
      <div class="tabs mb-20">
        ${cats.map(c=>`
          <button class="tab-btn ${this.catActiva===c?"active":""}"
            onclick="Pages.whatsapp.filtrarCat('${c}',this)">
            ${c==="todas"?"Todas":c}
          </button>`).join("")}
      </div>

      <div class="grid-6-4">
        <!-- Lista de plantillas -->
        <div id="wa-list">${this.renderLista()}</div>
        <!-- Panel de preview/edición -->
        <div id="wa-preview-panel">${this.renderPreviewPanel()}</div>
      </div>
      <div id="wa-modal"></div>`;
  },

  filtrarCat(cat, btn) {
    this.catActiva = cat;
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("wa-list").innerHTML = this.renderLista();
  },

  renderLista() {
    const data = this.catActiva === "todas"
      ? DB.waTemplates
      : DB.waTemplates.filter(t=>t.categoria===this.catActiva);

    const catColors = { Ventas:"badge-teal", Reservas:"badge-green", Equipos:"badge-purple", Cobros:"badge-amber", Suplidores:"badge-red", Fidelización:"badge-neutral" };

    return `<div style="display:flex;flex-direction:column;gap:10px">
      ${data.map(t=>`
        <div class="card" style="cursor:pointer;transition:all var(--t-fast);${this.templateActiva===t.id?"border-color:var(--teal-400);box-shadow:0 0 0 3px rgba(1,161,170,0.1)":""}"
          onclick="Pages.whatsapp.selectTemplate('${t.id}')">
          <div style="padding:14px 18px;display:flex;align-items:flex-start;gap:12px">
            <div style="font-size:22px;flex-shrink:0">${t.emoji}</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                <div style="font-size:13.5px;font-weight:700;color:var(--ink-900)">${t.nombre}</div>
                <span class="badge ${catColors[t.categoria]||"badge-neutral"}">${t.categoria}</span>
              </div>
              <div style="font-size:12px;color:var(--ink-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                ${t.template.split("\n")[0].substring(0,80)}…
              </div>
              <div style="display:flex;align-items:center;gap:12px;margin-top:8px">
                <span style="font-size:11px;color:var(--ink-400)">${iconSVG("send","",11)} ${t.usos} usos</span>
                <span style="font-size:11px;color:var(--ink-400)">${iconSVG("clock","",11)} ${DB.fmtDate(t.ultimoUso)}</span>
              </div>
            </div>
            <div style="display:flex;gap:4px;flex-shrink:0">
              <button class="btn btn-wa btn-sm" onclick="event.stopPropagation();Pages.whatsapp.usarTemplate('${t.id}')">
                ${iconSVG("send","",13)} Usar
              </button>
            </div>
          </div>
        </div>`).join("")}
    </div>`;
  },

  renderPreviewPanel() {
    if (!this.templateActiva) {
      return `
        <div class="card" style="height:100%">
          <div class="card-body">
            <div class="empty-state" style="padding:40px 20px">
              ${iconSVG("message-circle","empty-icon-svg",28)}
              <div class="empty-title">Selecciona una plantilla</div>
              <p class="empty-desc">Haz clic en cualquier plantilla para previsualizar el mensaje y personalizarlo</p>
            </div>
          </div>
        </div>`;
    }
    const t = DB.waTemplates.find(x=>x.id===this.templateActiva);
    if (!t) return "";

    // Detect variables in template
    const vars = [...new Set([...t.template.matchAll(/\{(\w+)\}/g)].map(m=>m[1]))];
    const varLabels = {
      nombre:"Nombre cliente", campamento:"Campamento", adultos:"Adultos",
      ninos:" + niños (ej: + 2 niños)", fecha:"Fecha evento", noches:"Noches",
      total:"Total RD$", deposito:"Depósito RD$", numero_factura:"Nº Factura",
      equipo:"Equipo(s)", fecha_salida:"Fecha salida", fecha_retorno:"Fecha retorno",
      zona:"Zona entrega", suplidor:"Nombre suplidor", periodo:"Período",
      monto:"Monto RD$", banco_suplidor:"Banco suplidor", referencia:"Referencia",
      facturas:"Facturas incluidas",
    };

    return `
      <div style="display:flex;flex-direction:column;gap:14px">
        <!-- Variables form -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">${t.emoji} ${t.nombre}</div>
            <span class="badge badge-teal">${t.categoria}</span>
          </div>
          <div class="card-body">
            ${vars.length ? `
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-400);margin-bottom:12px">
                Personalizar campos
              </div>
              <div style="display:flex;flex-direction:column;gap:10px">
                ${vars.map(v=>`
                  <div class="form-group" style="margin:0">
                    <label class="form-label" style="font-size:11px">${varLabels[v]||v}</label>
                    <input class="form-input" style="font-size:12.5px" id="waf-${v}"
                      placeholder="${varLabels[v]||v}"
                      value="${this.camposForm[v]||""}"
                      oninput="Pages.whatsapp.updateCampo('${v}',this.value)">
                  </div>`).join("")}
              </div>` : "<p style='font-size:12px;color:var(--ink-400)'>Esta plantilla no tiene variables</p>"}

            <button class="btn btn-secondary btn-sm w-full" style="margin-top:14px" onclick="Pages.whatsapp.autoFill()">
              ${iconSVG("refresh-cw","",13)} Auto-completar con último cliente
            </button>
          </div>
        </div>

        <!-- Preview WA -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">${iconSVG("whatsapp")} Preview del mensaje</div>
            <button class="btn btn-ghost btn-sm btn-icon" onclick="Pages.whatsapp.copiarMensaje()" data-tooltip="Copiar">
              ${iconSVG("copy")}
            </button>
          </div>
          <div style="background:#075e54;padding:10px 14px;display:flex;align-items:center;gap:8px">
            <div style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center">
              ${iconSVG("tent","",13)}
            </div>
            <span style="font-size:12px;font-weight:600;color:white">CAMPEACH RD</span>
          </div>
          <div style="background:#d9dbd5;padding:14px">
            <div style="background:#e9f8ef;border-radius:12px 12px 0 12px;padding:12px 14px;font-size:12.5px;line-height:1.7;white-space:pre-wrap;color:#111;border:1px solid #c3e6cb;max-height:280px;overflow-y:auto" id="wa-preview-content">
              ${this.buildMessage(t)}
            </div>
          </div>
          <div style="padding:12px 16px;display:flex;gap:8px">
            <button class="btn btn-wa" style="flex:1" onclick="Pages.whatsapp.enviarWA()">
              ${iconSVG("send")} Enviar
            </button>
            <button class="btn btn-secondary btn-sm" onclick="Pages.whatsapp.copiarMensaje()">
              ${iconSVG("copy")} Copiar
            </button>
          </div>
        </div>
      </div>`;
  },

  buildMessage(t) {
    let msg = t.template;
    Object.entries(this.camposForm).forEach(([k,v])=>{
      msg = msg.replace(new RegExp(`\\{${k}\\}`,"g"), v||`{${k}}`);
    });
    return msg;
  },

  selectTemplate(id) {
    this.templateActiva = id;
    this.camposForm = {};
    document.getElementById("wa-preview-panel").innerHTML = this.renderPreviewPanel();
    document.getElementById("wa-list").innerHTML = this.renderLista();
  },

  updateCampo(key, val) {
    this.camposForm[key] = val;
    const t = DB.waTemplates.find(x=>x.id===this.templateActiva);
    const prev = document.getElementById("wa-preview-content");
    if (prev && t) prev.textContent = this.buildMessage(t);
  },

  autoFill() {
    const lastRes = DB.reservas[0];
    if (!lastRes) return;
    this.camposForm = {
      nombre: lastRes.cliente.split(" ")[0],
      campamento: lastRes.campamento,
      adultos: lastRes.adultos,
      fecha: DB.fmtDate(lastRes.fechaEvento),
      noches: lastRes.noches,
      total: DB.fmt(lastRes.total),
      deposito: "RD$0",
      numero_factura: lastRes.num,
    };
    document.getElementById("wa-preview-panel").innerHTML = this.renderPreviewPanel();
  },

  copiarMensaje() {
    const t = DB.waTemplates.find(x=>x.id===this.templateActiva);
    if (!t) return App.toast("Selecciona una plantilla primero","warning");
    const msg = this.buildMessage(t);
    navigator.clipboard?.writeText(msg).then(()=>App.toast("Mensaje copiado al portapapeles ✓","success")).catch(()=>App.toast("Copia manual del preview","info"));
  },

  enviarWA() {
    const tel = this.camposForm.telefono?.replace(/\D/g,"")||"";
    const t = DB.waTemplates.find(x=>x.id===this.templateActiva);
    if (!t) return App.toast("Selecciona una plantilla","warning");
    const msg = encodeURIComponent(this.buildMessage(t));
    if (tel) window.open(`https://wa.me/1${tel}?text=${msg}`,"_blank");
    else { this.copiarMensaje(); App.toast("Sin teléfono — mensaje copiado","warning",4000); }
  },

  usarTemplate(id) {
    this.selectTemplate(id);
    document.getElementById("wa-preview-panel")?.scrollIntoView({behavior:"smooth"});
  },

  openNueva() {
    App.toast("Editor de nueva plantilla — próxima actualización","info");
  },
};

                <input class="form-input" id="sp-banco" placeholder="Banco Popular, Banreservas…">
              </div>
              <div class="form-group">
                <label class="form-label">Referencia / Comprobante</label>
                <input class="form-input" id="sp-ref" placeholder="Nº de transferencia">

                <label class="form-label">Facturas incluidas</label>
                <input class="form-input" id="sp-facturas" placeholder="FAC-001, FAC-002…">

            </div>

              ${iconSVG("whatsapp")} Enviar WA

            <button class="btn btn-primary" onclick="Pages.suplidores.guardarPago('${supId}')">
              ${iconSVG("check")} Registrar pago
            </button>
            <button class="btn btn-secondary" onclick="this.closest('.modal-backdrop').remove()">Cancelar</button>
          </div>
        </div>
      </div>`;
  },

  guardarPago(supId) {
    const monto = parseFloat(document.getElementById("sp-monto")?.value||0);
    if (!monto) return App.toast("Ingresa el monto","warning");
    const s = DB.suplidores.find(x=>x.id===supId);
    if (s) {
      s.pagadoYTD += monto;
      if (s.pendiente > 0) s.pendiente = Math.max(0, s.pendiente - monto);
      App.toast(`Pago de ${DB.fmt(monto)} registrado a ${s.campamento}`,"success");
      document.querySelector("#sup-modal .modal-backdrop")?.remove();
      this.render(document.getElementById("main-content"));
    }
  },

  genWASuplidor(supId) {
    const s = DB.suplidores.find(x=>x.id===supId);
    const monto = document.getElementById("sp-monto")?.value||"—";
    const ref = document.getElementById("sp-ref")?.value||"—";
    const facturas = document.getElementById("sp-facturas")?.value||"—";
    const msg = `Hola ${s?.nombre.split(" ")[0]}! 👋\n\nTe confirmamos el pago correspondiente a *${s?.campamento}*:\n\n💰 *Monto: RD$${parseFloat(monto).toLocaleString("es-DO")}*\n📋 Referencia: ${ref}\n🗒️ Facturas: ${facturas}\n\nGracias por ser parte de CAMPEACH RD 🌿`;
    navigator.clipboard?.writeText(msg).then(()=>App.toast("Mensaje WA copiado","success")).catch(()=>{});
  },

  openNuevo() { App.toast("Formulario nuevo suplidor — próxima actualización","info"); },
};

// PERSISTENCIA — localStorage
// ════════════════════════════════════════════════════════════
const Store = {
  KEY: "campeach_data_v1",

  save() {
    try {
      const data = {
        clientes:         DB.clientes,
        reservas:         DB.reservas,
        gastos:           DB.gastos,
        pagosRegistrados: DB.pagosRegistrados,
        alquileres:       DB.alquileres,
        suplidores:       DB.suplidores,
        equipos:          DB.equipos,
        pipeline:         DB.pipeline,
        cotizaciones:     DB.cotizaciones,
        nomina:           DB.nomina || [],
        lastSaved:        new Date().toISOString(),
      };
      localStorage.setItem(this.KEY, JSON.stringify(data));
      return true;
    } catch(e) {
      console.warn("Store.save error:", e);
      return false;
    }
  },

  load() {
    try {
      const raw = localStorage.getItem(this.KEY);
      if (!raw) return false;
      const data = JSON.parse(raw);
      // Merge saved data into DB (don't overwrite functions)
      if (data.clientes)         DB.clientes         = data.clientes;
      if (data.reservas)         DB.reservas         = data.reservas;
      if (data.gastos)           DB.gastos           = data.gastos;
      if (data.pagosRegistrados) DB.pagosRegistrados = data.pagosRegistrados;
      if (data.alquileres)       DB.alquileres       = data.alquileres;
      if (data.suplidores)       DB.suplidores       = data.suplidores;
      if (data.equipos)          DB.equipos          = data.equipos;
      if (data.pipeline)         DB.pipeline         = data.pipeline;
      if (data.cotizaciones)     DB.cotizaciones     = data.cotizaciones;
      if (data.nomina)           DB.nomina           = data.nomina;
      return data.lastSaved;
    } catch(e) {
      console.warn("Store.load error:", e);
      return false;
    }
  },

  clear() {
    localStorage.removeItem(this.KEY);
    App.toast("Datos locales eliminados — recargando datos demo","info");
    setTimeout(()=>location.reload(), 1500);
  },

  autoSave() {
    // Save every 30 seconds silently
    setInterval(()=>{ if(Store.save()) {} }, 30000);
  },
};

const Exporter = {
  toCSV(data, headers, filename) {
    const rows = data.map(row => headers.map(h => {
      const v = row[h.key] ?? "";
      return `"${String(v).replace(/"/g,'""')}"`;
    }).join(","));
    const csv = headers.map(h=>h.label).join(",") + "\n" + rows.join("\n");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"}));
    a.download = filename;
    a.click();
    App.toast(`${filename} descargado ✓`,"success");
  },

  clientes() {
    this.toCSV(DB.clientes, [
      {key:"nombre",label:"Nombre"},{key:"tel",label:"Teléfono"},
      {key:"email",label:"Email"},{key:"totalFacturado",label:"Total Facturado"},
      {key:"pedidos",label:"Pedidos"},{key:"etiqueta",label:"Etiqueta"},
      {key:"ultimaCompra",label:"Última Compra"},{key:"estado",label:"Estado"},
    ], "campeach_clientes.csv");
  },

  reservas() {
    this.toCSV(DB.reservas, [
      {key:"num",label:"Factura"},{key:"cliente",label:"Cliente"},
      {key:"campamento",label:"Campamento"},{key:"servicio",label:"Servicio"},
      {key:"fechaEvento",label:"Fecha Evento"},{key:"adultos",label:"Adultos"},
      {key:"noches",label:"Noches"},{key:"total",label:"Pago Cliente"},
      {key:"suplidorPago",label:"Costo Suplidor"},{key:"ganancia",label:"Ganancia CAMPEACH"},
      {key:"estado",label:"Estado"},{key:"metodo",label:"Método Pago"},
    ], "campeach_reservas_2026.csv");
  },

  gastos() {
    this.toCSV(DB.gastos, [
      {key:"fecha",label:"Fecha"},{key:"cat",label:"Categoría"},
      {key:"desc",label:"Descripción"},{key:"proveedor",label:"Proveedor"},
      {key:"monto",label:"Monto RD$"},{key:"mes",label:"Mes"},
    ], "campeach_gastos_2026.csv");
  },

  suplidores() {
    this.toCSV(DB.suplidores, [
      {key:"campamento",label:"Campamento"},{key:"nombre",label:"Contacto"},
      {key:"tel",label:"Teléfono"},{key:"pagadoYTD",label:"Pagado YTD"},
      {key:"pendiente",label:"Pendiente"},
    ], "campeach_suplidores.csv");
  },

  json() {
    const data = {
      exportDate: new Date().toISOString(),
      empresa: DB.empresa,
      clientes: DB.clientes,
      reservas: DB.reservas,
      gastos: DB.gastos,
      suplidores: DB.suplidores,
      equipos: DB.equipos,
      nomina: DB.nomina,
    };
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));
    a.download = "campeach_backup_" + new Date().toISOString().split("T")[0] + ".json";
    a.click();
    App.toast("Backup JSON descargado ✓","success");
  },
};

Pages.clientes.guardarNuevo = function() {
  const nombre = document.getElementById("nc2-nombre")?.value?.trim();
  const tel    = document.getElementById("nc2-tel")?.value?.trim();
  if (!nombre || !tel) return App.toast("Nombre y teléfono son obligatorios","warning");

  const newC = {
    id:             "CL" + String(DB.clientes.length+1).padStart(3,"0"),
    nombre,
    tel,
    email:          document.getElementById("nc2-email")?.value||"",
    etiqueta:       document.getElementById("nc2-etiqueta")?.value||"Lead",
    estado:         "Lead",
    totalFacturado: 0,
    pedidos:        0,
    ultimaCompra:   null,
  };
  DB.clientes.unshift(newC);

  // Auto-add to pipeline
  DB.pipeline.unshift({
    id:         "L" + String(DB.pipeline.length+1).padStart(3,"0"),
    clienteId:  newC.id,
    cliente:    nombre,
    campamento: "Por definir",
    monto:      0,
    fecha:      new Date().toISOString().split("T")[0],
    estado:     "Consulta",
    adultos:    1, noches:1, urgencia:"media",
  });

  Store.save();
  App.toast(`${nombre} agregado al CRM y al pipeline ✓`,"success");
  document.querySelector(".modal-backdrop")?.remove();
  Pages.clientes.render(document.getElementById("main-content"));
};

Pages.clientes._sendWA_new = function() {
  const nombre = document.getElementById("nc2-nombre")?.value?.split(" ")[0]||"";
  const tel    = document.getElementById("nc2-tel")?.value?.replace(/\D/g,"")||"";
  const msg    = encodeURIComponent(`¡Hola ${nombre}! 😊\n\nGracias por contactar a CAMPEACH RD. Somos una red de campamentos seguros y experiencias al aire libre en República Dominicana 🏕️🌿\n\n¿En qué destino estás interesado/a? Con gusto te ayudamos a planificar tu aventura perfecta.\n\n¡Nos vemos pronto!`);
  if (tel) window.open(`https://wa.me/1${tel}?text=${msg}`,"_blank");
  else App.toast("Ingresa el teléfono primero","warning");
};

App.navigate = function(pageId, btnEl) {
  const extraPages = {
    nomina: { title:"Nómina y contratistas", section:"Finanzas" },
  };
  _origNavigate(pageId, btnEl);
  // Override title for nomina if not caught
  if (extraPages[pageId]) {
    const el = document.getElementById("tb-title");
    const sec = document.getElementById("tb-section");
    const sep = document.getElementById("tb-sep");
    if (el) el.textContent = extraPages[pageId].title;
    if (sec) sec.textContent = extraPages[pageId].section;
    if (sep) sep.style.display = "";
  }
};

            <div class="card-header">
              <div>
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">

              <div style="text-align:right">
                <div style="font-size:24px;font-weight:800;color:${pct===100?"var(--green-400)":urgente?"var(--red-400)":"var(--teal-500)"};font-family:var(--font-display)">${pct}%</div>

              </div>

                    onclick="Pages.checklist._toggle('${cl.reservaId}','${t.id}')">
                    <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${t.hecha?"var(--green-400)":"var(--ink-200)"};background:${t.hecha?"var(--green-400)":"white"};display:flex;align-items:center;justify-content:center;flex-shrink:0">
                      ${t.hecha?`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:""}
                    </div>
                    <div style="flex:1;font-size:13px;color:${t.hecha?"var(--green-600)":"var(--ink-700)"};${t.hecha?"text-decoration:line-through;opacity:.7":""}">${t.texto}</div>
                    <span style="font-size:10px;padding:2px 7px;border-radius:20px;background:${tc[t.tipo]}20;color:${tc[t.tipo]};font-weight:600">${tl[t.tipo]}</span>
                  </div>`).join("")}
              </div>
              <div style="margin-top:14px;display:flex;gap:8px">
                <button class="btn btn-wa btn-sm" style="flex:1" onclick="Pages.checklist._waCliente('${cl.reservaId}')">${iconSVG("whatsapp")} Cliente</button>
                <button class="btn btn-secondary btn-sm" onclick="Pages.checklist._waSuplidor('${cl.reservaId}')">${iconSVG("truck")} Suplidor</button>
                ${pct<100?`<button class="btn btn-primary btn-sm" onclick="Pages.checklist._todo('${cl.reservaId}')">Marcar todo ✓</button>`:`<span class="badge badge-green" style="align-self:center;padding:6px 12px">✓ Completo</span>`}

  _waCliente(rid){
    const cl=DB.checklists.find(c=>c.reservaId===rid);
    const r=DB.reservas.find(x=>x.id===rid);
    const c=DB.clientes.find(x=>x.id===r?.clienteId);
    const msg=`¡Hola ${cl.cliente.split(" ")[0]}! 🏕️\n\nTe enviamos los detalles para *${cl.campamento}*:\n\n📅 Fecha: ${DB.fmtDate(cl.fechaEvento)}\n• Check-in: 3:00 PM | Check-out: 12:00 PM\n• Llevar: ropa cómoda, linterna, repelente, sábanas\n\n¿Alguna duda? ¡Aquí estamos! 🌿`;
    const tel=c?.tel?.replace(/\D/g,"")||"";
    if(tel)window.open(`https://wa.me/1${tel}?text=${encodeURIComponent(msg)}`,"_blank");
    else{navigator.clipboard?.writeText(msg);App.toast("Mensaje copiado","success");}
  },
  _waSuplidor(rid){
    const cl=DB.checklists.find(c=>c.reservaId===rid);
    const s=DB.suplidores.find(x=>x.campamento===cl?.campamento);
    const msg=`Hola! 👋 CAMPEACH RD.\n\nConfirmamos reserva en *${cl?.campamento}*:\n📅 ${DB.fmtDate(cl?.fechaEvento)}\n👥 ${cl?.cliente}\n\n¿Confirmas disponibilidad? 🙏`;
    if(s?.tel)window.open(`https://wa.me/${s.tel.replace(/\D/g,"")}?text=${encodeURIComponent(msg)}`,"_blank");
    else App.toast("Sin teléfono del suplidor","warning");
  },
};

Pages.calendario = {
  mes:3, anio:2026,
  render(container) {
    container.innerHTML = `
      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-header-title">Calendario de reservas</h1>
          <p class="page-header-sub">Vista mensual · Clic en un día para ver detalle</p>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-secondary btn-sm" onclick="Pages.calendario.cambiar(-1)">${iconSVG("chevron-down","",14)} Anterior</button>
          <button class="btn btn-secondary btn-sm" onclick="Pages.calendario.cambiar(1)">Siguiente ${iconSVG("chevron-right","",14)}</button>
          <button class="btn btn-primary btn-sm" onclick="App.navigate('cotizaciones')">${iconSVG("plus")} Nueva</button>
        </div>
      </div>
      <div class="card" id="cal-card">${this._buildCal()}</div>
      <div id="cal-modal"></div>`;
  },
  _buildCal() {
    const mN=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const dS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
    const hoy=new Date();
    const p1=new Date(this.anio,this.mes,1).getDay();
    const dm=new Date(this.anio,this.mes+1,0).getDate();
    const rMes=DB.reservas.filter(r=>{const d=new Date(r.fechaEvento+"T00:00:00");return d.getMonth()===this.mes&&d.getFullYear()===this.anio;});
    const cc={"Villa Altagracia":"#01a1aa","Los Cacaos":"#1d9e75","Jarabacoa":"#007a82","Samaná / Rincón":"#6b5ce7","El Valle":"#ff9820","Santiago":"#c94a2a","Taiku":"#b07010","Ocoa":"#3b6d11"};
    const celdas=[];
    for(let i=0;i<p1;i++)celdas.push(null);
    for(let d=1;d<=dm;d++){
      const res=rMes.filter(r=>new Date(r.fechaEvento+"T00:00:00").getDate()===d);
      const isHoy=hoy.getDate()===d&&hoy.getMonth()===this.mes&&hoy.getFullYear()===this.anio;
      celdas.push({d,res,isHoy});
    }
    const filas=[];
    for(let i=0;i<celdas.length;i+=7)filas.push(celdas.slice(i,i+7));
    return `
      <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <div style="font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--ink-900)">${mN[this.mes]} ${this.anio}</div>
        <div style="font-size:12px;color:var(--ink-500)">${rMes.length} reserva${rMes.length!==1?"s":""} · ${DB.fmt(rMes.reduce((s,r)=>s+r.total,0))}</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;padding:8px 14px;border-bottom:1px solid var(--border)">
        ${dS.map(d=>`<div style="font-size:10px;font-weight:700;color:var(--ink-400);text-transform:uppercase;letter-spacing:.5px">${d}</div>`).join("")}
      </div>
      <div style="padding:8px 10px">
        ${filas.map(f=>`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px">
          ${f.map(c=>!c?`<div></div>`:`<div style="min-height:64px;padding:5px;border-radius:7px;cursor:${c.res.length?"pointer":"default"};border:${c.isHoy?"2px solid var(--teal-400)":"1px solid var(--border)"};background:${c.isHoy?"var(--teal-50)":""};transition:background .15s"
            ${c.res.length?`onclick="Pages.calendario._verDia(${c.d})"`:""}
            onmouseenter="if(${c.res.length})this.style.background='var(--teal-50)'"
            onmouseleave="if(!${c.isHoy})this.style.background=''">
            <div style="font-size:12px;font-weight:${c.isHoy?"800":"500"};color:${c.isHoy?"var(--teal-600)":"var(--ink-700)"};margin-bottom:3px">${c.d}</div>
            ${c.res.slice(0,2).map(r=>`<div style="font-size:10px;padding:1px 4px;border-radius:3px;background:${cc[r.campamento]||"var(--ink-200)"}22;color:${cc[r.campamento]||"var(--ink-600)"};font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px">${r.cliente.split(" ")[0]}</div>`).join("")}
            ${c.res.length>2?`<div style="font-size:9px;color:var(--ink-400)">+${c.res.length-2}</div>`:""}
          </div>`).join("")}
        </div>`).join("")}
      </div>`;
  },
  cambiar(d){this.mes+=d;if(this.mes<0){this.mes=11;this.anio--;}if(this.mes>11){this.mes=0;this.anio++;}const c=document.getElementById("cal-card");if(c)c.innerHTML=this._buildCal();},
  _verDia(dia){
    const mN=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const res=DB.reservas.filter(r=>{const d=new Date(r.fechaEvento+"T00:00:00");return d.getDate()===dia&&d.getMonth()===this.mes&&d.getFullYear()===this.anio;});
    if(!res.length)return;
    document.getElementById("cal-modal").innerHTML=`
      <div class="modal-backdrop" onclick="if(event.target===this)this.remove()">
        <div class="modal modal-md">
          <div class="modal-header">
            <div><div class="modal-title">${dia} de ${mN[this.mes]} ${this.anio}</div><div class="modal-subtitle">${res.length} reserva${res.length!==1?"s":""} · ${DB.fmt(res.reduce((s,r)=>s+r.total,0))}</div></div>
            <button class="modal-close" onclick="this.closest('.modal-backdrop').remove()">${iconSVG("x")}</button>
          </div>
          <div class="modal-body">
            ${res.map(r=>`<div style="padding:12px;background:var(--ink-25);border-radius:8px;margin-bottom:10px;border:1px solid var(--border)">
              <div style="display:flex;justify-content:space-between;margin-bottom:8px">
                <div><div style="font-size:14px;font-weight:700">${r.cliente}</div><div style="font-size:12px;color:var(--teal-600)">${r.campamento}</div></div>
                <span class="badge ${DB.estadoBadge(r.estado)}">${r.estado}</span>
              </div>
              <div style="display:flex;gap:12px;font-size:12px;color:var(--ink-500)">

    const msgs=document.getElementById("ai-msgs");
    if(!msgs)return;
    const div=document.createElement("div");
    div.style.cssText=`display:flex;gap:10px;${rol==="user"?"flex-direction:row-reverse":""}`;
    div.innerHTML=`<div style="width:30px;height:30px;border-radius:50%;background:${rol==="user"?"var(--ink-200)":"var(--teal-400)"};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;color:${rol==="user"?"var(--ink-600)":"white"}">${rol==="user"?"K":iconSVG("star","",12)}</div><div style="background:${rol==="user"?"var(--ink-100)":"var(--teal-50)"};border:1px solid ${rol==="user"?"var(--border)":"var(--teal-100)"};border-radius:${rol==="user"?"12px 0 12px 12px":"0 12px 12px 12px"};padding:12px 14px;max-width:85%;font-size:13px;color:var(--ink-800);line-height:1.7;white-space:pre-wrap">${texto}</div>`;
    msgs.appendChild(div);msgs.scrollTo(0,msgs.scrollHeight);
  },

  recomendar(){
    const p=document.getElementById("rec-pres")?.value;
    const t=document.getElementById("rec-tipo")?.value;
    const n=document.getElementById("rec-pers")?.value||4;
    const pf={bajo:c=>c.precio_base<1000,medio:c=>c.precio_base>=1000&&c.precio_base<=2500,alto:c=>c.precio_base>2500&&c.precio_base<=5000,premium:c=>c.precio_base>5000||!c.precio_base};
    const tf={montana:c=>c.relieve==="Montaña"||c.relieve==="Bosque",playa:c=>c.bal?.includes("Playa"),rio:c=>c.bal?.includes("Río")||c.bal?.includes("Cascada"),familiar:c=>c.cap>50&&!c.v4x4,romantico:c=>c.precio_base>2000&&c.pedidos>2};
    let camps=DB.campamentos.filter(c=>c.activo);
    if(pf[p])camps=camps.filter(pf[p]);
    if(tf[t])camps=camps.filter(tf[t]);
    camps=camps.sort((a,b)=>b.pedidos-a.pedidos).slice(0,3);
    const resp=camps.length?`Para ${n} personas recomiendo:\n\n${camps.map((c,i)=>`${i+1}. *${c.nombre}* (${c.region})\n   Desde RD$${(c.precio_base||0).toLocaleString()}/persona · ${c.bal||""}\n   ${c.pedidos} reservas YTD`).join("\n\n")}\n\n¿Preparo la cotización para alguno?`:`No encontré campamentos exactos. Los más populares ahora: ${DB.campamentos.sort((a,b)=>b.pedidos-a.pedidos).slice(0,3).map(c=>c.nombre).join(", ")}`;
    this._add("user","Recomiéndame campamentos para "+n+" personas");
    this._add("ai",resp);
  },

  contenido(){
    const tipo=document.getElementById("cont-tipo")?.value;
    const camp=document.getElementById("cont-camp")?.value;
    if(!camp)return App.toast("Selecciona un campamento","warning");
    const c=DB.campamentos.find(x=>x.nombre===camp);
    const precio=c?.precio_base?"RD$"+c.precio_base.toLocaleString():"desde RD$700";
    const textos={
      caption:`✨ ${camp} te espera 🏕️\n\nNaturaleza pura, silencio real y conexión de verdad.\n\n${c?.bal&&c.bal!=="No"?"🌊 "+c.bal+"\n":""}📍 ${c?.region||"RD"}\n💰 Desde ${precio}/persona\n\n📩 Reserva por DM o WhatsApp\n\n#CAMPEACHRD #Camping #RD #${camp.replace(/\s/g,"")}`,
      reel:`[GUIÓN REEL — ${camp}]\n\n0-3s: Hook — "¿Cansado de la ciudad? Mira esto..."\n3-15s: Llegada e instalaciones del campamento\n15-25s: ${c?.bal||"naturaleza"} y actividades\n25-33s: Fogata, grupo disfrutando\n33-40s: CTA — Reserva tu lugar, link en bio\n\n#CAMPEACHRD @campeachrd`,
      wa:`¡Hola! 😊 ¿Tienes plan para este fin de semana?\n\nTenemos disponibilidad en *${camp}* 🏕️\n\n${c?.bal&&c.bal!=="No"?"🌊 "+c.bal+"\n":""}💰 Desde ${precio}/persona\n✅ Todo organizado por nosotros\n\n¿Cuántas personas serían? Te cotizo ahora 🌿`,
      story:`[HISTORIA]\n\n🏕️ PRÓXIMO DESTINO\n${camp.toUpperCase()}\n\n📍 ${c?.region}\n💰 Desde ${precio}\n\n👆 Desliza para reservar`,
    };
    this._add("user","Genera "+tipo+" para "+camp);
    this._add("ai",textos[tipo]||"Tipo no disponible");
  },
};

    {section:"Sistema"},{id:"notificaciones",label:"Notificaciones",icon:"bell",badge:noL||null},{id:"usuarios",label:"Usuarios / Roles",icon:"layers"},{id:"incidencias",label:"Incidencias",icon:"alert-triangle",badge:"2"},{id:"config",label:"Configuración",icon:"settings"},
  ];
  const items=nav.map(i=>{
    if(i.section!==undefined)return i.section?`<div class="nav-section-label">${i.section}</div>`:"";

    return `<button class="nav-item" data-page="${i.id}" onclick="App.navigate('${i.id}',this)">${iconSVG(i.icon,"nav-icon")} ${i.label} ${b}</button>`;
  }).join("");
  return `<aside class="sidebar" id="sidebar"><div class="sidebar-logo"><div class="sidebar-logo-mark">${iconSVG("tent","",18)}</div><div class="sidebar-logo-text"><div class="sidebar-logo-name">Campeach</div><div class="sidebar-logo-tagline">Sistema RD · v2.0</div></div></div><nav class="sidebar-nav" id="sidebar-nav">${items}</nav><div class="sidebar-footer"><div class="sidebar-user"><div class="user-avatar">KM</div><div class="user-info"><div class="user-name">Katherine Mella</div><div class="user-role">Director General</div></div></div><div style="padding:6px 10px;margin-top:4px"><div id="save-status" style="font-size:10px;color:rgba(255,255,255,.25);text-align:center"></div></div></div></aside>`;
};

};
