/* ============================================================
   CAMPEACH RD — DESIGN SYSTEM
   v1.0 · Fase 1
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap');

/* ── TOKENS ────────────────────────────────────────────────── */
:root {
  /* Brand */
  --teal-50:  #f0faf9;
  --teal-100: #d5f2ef;
  --teal-200: #aae5e0;
  --teal-400: #01a1aa;
  --teal-500: #007a82;
  --teal-600: #005a60;
  --teal-700: #003d42;

  --amber-50:  #fffbf0;
  --amber-100: #fef0cc;
  --amber-400: #ff9820;
  --amber-500: #e07800;
  --amber-600: #b05e00;

  --green-50:  #f0faf5;
  --green-400: #1d9e75;
  --green-500: #0f6e56;

  --red-50:   #fef2f0;
  --red-400:  #c94a2a;
  --red-500:  #a33520;

  --purple-50:  #f5f3ff;
  --purple-400: #6b5ce7;
  --purple-500: #4a42b0;

  /* Neutrals */
  --ink-900: #111110;
  --ink-800: #1c1c1a;
  --ink-700: #2d2d2b;
  --ink-600: #454542;
  --ink-500: #6b6b68;
  --ink-400: #909088;
  --ink-300: #b8b8b2;
  --ink-200: #d8d8d2;
  --ink-100: #ececea;
  --ink-50:  #f7f6f3;
  --ink-25:  #fbfaf8;

  /* Semantic */
  --bg:           #f7f6f3;
  --bg-card:      #ffffff;
  --bg-sidebar:   #111110;
  --bg-topbar:    #ffffff;
  --border:       rgba(0,0,0,0.07);
  --border-strong: rgba(0,0,0,0.12);
  --shadow-sm:    0 1px 2px rgba(0,0,0,0.04), 0 1px 6px rgba(0,0,0,0.03);
  --shadow-md:    0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg:    0 12px 40px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.06);
  --shadow-xl:    0 24px 64px rgba(0,0,0,0.14), 0 8px 24px rgba(0,0,0,0.08);

  /* Typography */
  --font-display: 'Fraunces', Georgia, serif;
  --font-body:    'DM Sans', -apple-system, sans-serif;

  /* Spacing */
  --sidebar-w:    240px;
  --topbar-h:     60px;
  --radius-sm:    6px;
  --radius-md:    10px;
  --radius-lg:    14px;
  --radius-xl:    20px;

  /* Transitions */
  --t-fast:   120ms cubic-bezier(0.16,1,0.3,1);
  --t-med:    220ms cubic-bezier(0.16,1,0.3,1);
  --t-slow:   380ms cubic-bezier(0.16,1,0.3,1);
}

/* ── RESET ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink-800);
  line-height: 1.5;
  overflow-x: hidden;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }
img { max-width: 100%; }

/* ── SCROLLBAR ─────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--ink-200); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-300); }

/* ── APP SHELL ─────────────────────────────────────────────── */
.app-shell {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  grid-template-areas:
    "sidebar topbar"
    "sidebar content";
  min-height: 100vh;
}

/* ── SIDEBAR ───────────────────────────────────────────────── */
.sidebar {
  grid-area: sidebar;
  background: var(--bg-sidebar);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  display: flex;
  flex-direction: column;
  z-index: 100;
  overflow: hidden;
}

/* Logo */
.sidebar-logo {
  padding: 20px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  gap: 11px;
}
.sidebar-logo-mark {
  width: 34px; height: 34px;
  background: var(--teal-400);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.sidebar-logo-mark svg { width: 18px; height: 18px; }
.sidebar-logo-text { line-height: 1.2; }
.sidebar-logo-name {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  color: #ffffff;
  letter-spacing: -0.2px;
}
.sidebar-logo-tagline {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  font-weight: 500;
}

/* Nav */
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.sidebar-nav::-webkit-scrollbar { display: none; }

.nav-section-label {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.22);
  padding: 14px 10px 5px;
  margin-top: 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  color: rgba(255,255,255,0.55);
  font-size: 13px;
  font-weight: 450;
  transition: all var(--t-fast);
  position: relative;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.nav-item:hover {
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.85);
}
.nav-item.active {
  background: rgba(1,161,170,0.18);
  color: var(--teal-200);
}
.nav-item.active .nav-icon { color: var(--teal-400); }
.nav-icon {
  width: 16px; height: 16px;
  flex-shrink: 0;
  opacity: 0.7;
  transition: opacity var(--t-fast);
}
.nav-item.active .nav-icon,
.nav-item:hover .nav-icon { opacity: 1; }
.nav-badge {
  margin-left: auto;
  background: var(--amber-400);
  color: white;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 20px;
  min-width: 16px;
  text-align: center;
}
.nav-badge.teal { background: var(--teal-400); }

/* Sidebar footer */
.sidebar-footer {
  padding: 12px 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.sidebar-user {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--t-fast);
}
.sidebar-user:hover { background: rgba(255,255,255,0.06); }
.user-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--teal-500), var(--teal-400));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  color: white;
  flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name {
  font-size: 12.5px; font-weight: 500;
  color: rgba(255,255,255,0.85);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.user-role {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── TOPBAR ────────────────────────────────────────────────── */
.topbar {
  grid-area: topbar;
  position: sticky;
  top: 0;
  height: var(--topbar-h);
  background: var(--bg-topbar);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  z-index: 50;
  backdrop-filter: blur(8px);
}

.topbar-breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--ink-500);
  flex: 1;
}
.topbar-breadcrumb .page-title {
  font-weight: 600;
  color: var(--ink-800);
  font-size: 14px;
}
.topbar-breadcrumb .sep {
  color: var(--ink-300);
  font-size: 16px;
}

.topbar-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--ink-50);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 7px 12px;
  width: 240px;
  transition: all var(--t-fast);
}
.topbar-search:focus-within {
  border-color: var(--teal-400);
  background: white;
  box-shadow: 0 0 0 3px rgba(1,161,170,0.1);
  width: 300px;
}
.topbar-search input {
  border: none;
  background: none;
  font-size: 13px;
  color: var(--ink-700);
  outline: none;
  width: 100%;
}
.topbar-search input::placeholder { color: var(--ink-400); }
.topbar-search svg { width: 14px; height: 14px; color: var(--ink-400); flex-shrink: 0; }

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.topbar-icon-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: white;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-600);
  transition: all var(--t-fast);
  position: relative;
}
.topbar-icon-btn:hover {
  background: var(--ink-50);
  color: var(--ink-800);
  border-color: var(--border-strong);
}
.topbar-icon-btn svg { width: 16px; height: 16px; }
.notif-dot {
  position: absolute;
  top: 6px; right: 6px;
  width: 7px; height: 7px;
  background: var(--amber-400);
  border-radius: 50%;
  border: 1.5px solid white;
}

/* ── MAIN CONTENT ──────────────────────────────────────────── */
.main-content {
  grid-area: content;
  margin-left: var(--sidebar-w);
  min-height: calc(100vh - var(--topbar-h));
  padding: 28px;
  overflow-x: hidden;
}

/* ── PAGE HEADER ───────────────────────────────────────────── */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 16px;
}
.page-header-left {}
.page-header-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  color: var(--ink-900);
  letter-spacing: -0.5px;
  line-height: 1.2;
}
.page-header-sub {
  font-size: 13px;
  color: var(--ink-500);
  margin-top: 3px;
}
.page-header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* ── BUTTONS ───────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-body);
  border: 1px solid transparent;
  transition: all var(--t-fast);
  line-height: 1;
  white-space: nowrap;
}
.btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

.btn-primary {
  background: var(--teal-400);
  color: white;
  border-color: var(--teal-500);
  box-shadow: 0 1px 2px rgba(0,122,130,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
}
.btn-primary:hover:not(:disabled) {
  background: var(--teal-500);
  box-shadow: 0 3px 8px rgba(0,122,130,0.3);
  transform: translateY(-1px);
}
.btn-primary:active { transform: translateY(0); box-shadow: none; }

.btn-secondary {
  background: white;
  color: var(--ink-700);
  border-color: var(--border-strong);
  box-shadow: var(--shadow-sm);
}
.btn-secondary:hover:not(:disabled) {
  background: var(--ink-50);
  border-color: var(--ink-300);
}

.btn-ghost {
  background: transparent;
  color: var(--ink-600);
  border-color: transparent;
}
.btn-ghost:hover:not(:disabled) { background: var(--ink-100); color: var(--ink-800); }

.btn-danger {
  background: var(--red-50);
  color: var(--red-400);
  border-color: rgba(201,74,42,0.2);
}
.btn-danger:hover:not(:disabled) { background: var(--red-400); color: white; }

.btn-success {
  background: var(--green-50);
  color: var(--green-500);
  border-color: rgba(29,158,117,0.2);
}
.btn-success:hover:not(:disabled) { background: var(--green-400); color: white; }

.btn-wa {
  background: #25D366;
  color: white;
  border-color: #1da851;
}
.btn-wa:hover:not(:disabled) { background: #1da851; transform: translateY(-1px); }

.btn-pdf {
  background: var(--red-50);
  color: var(--red-400);
  border-color: rgba(201,74,42,0.2);
}
.btn-pdf:hover:not(:disabled) { background: var(--red-400); color: white; }

.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-lg { padding: 11px 22px; font-size: 14.5px; }
.btn-icon { padding: 8px; }
.btn-icon.btn-sm { padding: 6px; }

/* ── CARDS ─────────────────────────────────────────────────── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}
.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-800);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title svg { width: 16px; height: 16px; color: var(--teal-400); }
.card-subtitle { font-size: 12px; color: var(--ink-500); margin-top: 1px; }
.card-body { padding: 20px; }
.card-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  background: var(--ink-25);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
}

/* ── KPI CARDS ─────────────────────────────────────────────── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
  transition: all var(--t-med);
}
.kpi-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--kpi-color, var(--teal-400));
}
.kpi-card.amber { --kpi-color: var(--amber-400); }
.kpi-card.green { --kpi-color: var(--green-400); }
.kpi-card.red   { --kpi-color: var(--red-400); }
.kpi-card.purple { --kpi-color: var(--purple-400); }

.kpi-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--ink-500);
  margin-bottom: 8px;
}
.kpi-value {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--ink-900);
  line-height: 1;
  letter-spacing: -1px;
}
.kpi-meta {
  font-size: 12px;
  color: var(--ink-400);
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.kpi-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 7px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.kpi-badge.up { background: var(--green-50); color: var(--green-500); }
.kpi-badge.down { background: var(--red-50); color: var(--red-400); }
.kpi-icon {
  position: absolute;
  top: 18px; right: 18px;
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--kpi-color, var(--teal-400)) 12%, transparent);
  display: flex; align-items: center; justify-content: center;
}
.kpi-icon svg { width: 18px; height: 18px; color: var(--kpi-color, var(--teal-400)); }

/* ── GRIDS ─────────────────────────────────────────────────── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
.grid-7-3 { display: grid; grid-template-columns: 7fr 3fr; gap: 20px; }
.grid-6-4 { display: grid; grid-template-columns: 6fr 4fr; gap: 20px; }

/* ── TABLES ────────────────────────────────────────────────── */
.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  font-size: 13px;
}
.data-table thead tr {
  background: var(--ink-25);
  border-bottom: 1px solid var(--border);
}
.data-table th {
  padding: 11px 16px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--ink-500);
  white-space: nowrap;
}
.data-table th.sortable { cursor: pointer; user-select: none; }
.data-table th.sortable:hover { color: var(--teal-500); }
.data-table td {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--ink-700);
  vertical-align: middle;
}
.data-table tbody tr:last-child td { border-bottom: none; }
.data-table tbody tr { transition: background var(--t-fast); }
.data-table tbody tr:hover td { background: var(--ink-25); }
.data-table tbody tr.selected td { background: var(--teal-50); }

.td-main { font-weight: 500; color: var(--ink-900); }
.td-sub  { font-size: 11.5px; color: var(--ink-400); margin-top: 1px; }

/* ── BADGES / PILLS ────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11.5px;
  font-weight: 600;
  line-height: 1;
}
.badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; }
.badge-teal    { background: var(--teal-50);   color: var(--teal-600);  }
.badge-teal::before    { background: var(--teal-400); }
.badge-amber   { background: var(--amber-50);  color: var(--amber-600); }
.badge-amber::before   { background: var(--amber-400); }
.badge-green   { background: var(--green-50);  color: var(--green-500); }
.badge-green::before   { background: var(--green-400); }
.badge-red     { background: var(--red-50);    color: var(--red-400);   }
.badge-red::before     { background: var(--red-400); }
.badge-purple  { background: var(--purple-50); color: var(--purple-500); }
.badge-purple::before  { background: var(--purple-400); }
.badge-neutral { background: var(--ink-100);   color: var(--ink-600);   }
.badge-neutral::before { background: var(--ink-400); }

/* ── FORMS ─────────────────────────────────────────────────── */
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 12.5px; font-weight: 500; color: var(--ink-700); }
.form-label .required { color: var(--red-400); margin-left: 2px; }
.form-input,
.form-select,
.form-textarea {
  background: white;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  font-size: 13px;
  color: var(--ink-800);
  font-family: var(--font-body);
  transition: all var(--t-fast);
  outline: none;
  width: 100%;
}
.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  border-color: var(--teal-400);

      "Cancelada":   "badge-neutral",
      "Reembolso":   "badge-red",
      "Enviada":     "badge-teal",
      "Borrador":    "badge-neutral",
      "En revisión": "badge-amber",
      "Confirmado":  "badge-green",
      "Cotizado":    "badge-teal",
      "Seguimiento": "badge-amber",
      "Consulta":    "badge-neutral",
      "Completado":  "badge-green",
      "Perdido":     "badge-red",
      "Activo":      "badge-green",
      "Lead":        "badge-neutral",
    };
    return map[e] || "badge-neutral";
  },
  avatarColor(nombre) {
    const colors = ["#01a1aa","#007a82","#1d9e75","#ff9820","#6b5ce7","#c94a2a","#e07800","#0f6e56"];
    let h = 0;
    for (let c of nombre) h = c.charCodeAt(0) + ((h << 5) - h);
    return colors[Math.abs(h) % colors.length];
  },
  initials(nombre) {
    return nombre.split(" ").slice(0,2).map(p=>p[0]).join("").toUpperCase();
  },
};

        </div>

            ${iconSVG("plus")} Nueva cotización
          </button>
          <button class="topbar-icon-btn" data-tooltip="Notificaciones">
            ${iconSVG("bell")}

          </button>
          <button class="topbar-icon-btn" data-tooltip="Ayuda">
            ${iconSVG("help-circle")}
          </button>
        </div>
      </header>`;
  },

  // ── NAVIGATION ────────────────────────────────────────────
  bindNav() {},

  navigate(pageId, btnEl) {
    this.currentPage = pageId;

    // Update active nav
    document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
    const activeBtn = btnEl || document.querySelector(`[data-page="${pageId}"]`);
    if (activeBtn) activeBtn.classList.add("active");

    // Update topbar
    const pageInfo = {
      dashboard:    { title:"Dashboard",          section:null },
      leads:        { title:"Leads & Pipeline",   section:"Ventas" },
      cotizaciones: { title:"Cotizaciones",        section:"Ventas" },
      reservas:     { title:"Reservas",            section:"Ventas" },
      facturas:     { title:"Facturas",            section:"Ventas" },
      clientes:     { title:"Clientes / CRM",     section:"Clientes" },
      whatsapp:     { title:"Plantillas WhatsApp", section:"Clientes" },
      campamentos:  { title:"Campamentos",         section:"Operaciones" },
      equipos:      { title:"Equipos de camping",  section:"Operaciones" },
      suplidores:   { title:"Suplidores",          section:"Operaciones" },
      pagos:        { title:"Pagos",               section:"Finanzas" },
      gastos:       { title:"Gastos",              section:"Finanzas" },
      reportes:     { title:"Reportes",            section:"Finanzas" },
      incidencias:  { title:"Incidencias",         section:"Sistema" },
      config:       { title:"Configuración",       section:"Sistema" },
    };
    const info = pageInfo[pageId] || { title: pageId, section: null };
    document.getElementById("tb-title").textContent = info.title;
    const secEl  = document.getElementById("tb-section");
    const sepEl  = document.getElementById("tb-sep");
    if (info.section) {
      secEl.textContent  = info.section;
      sepEl.style.display = "";
    } else {
      secEl.textContent  = "";
      sepEl.style.display = "none";
    }

    // Render page
    const main = document.getElementById("main-content");
    main.innerHTML = "";

    if (Pages[pageId]) {
      Pages[pageId].render(main);
    } else {
      main.innerHTML = this.renderComingSoon(info.title);
    }

    window.scrollTo(0, 0);
  },

  renderComingSoon(title) {
    return `
      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-header-title">${title}</h1>
          <p class="page-header-sub">Este módulo estará disponible en próximas fases</p>
        </div>
      </div>
      <div class="card">
        <div class="card-body">
          <div class="empty-state">
            ${iconSVG("clock","empty-icon-svg",32)}
            <div class="empty-title">En construcción</div>
            <p class="empty-desc">El módulo <strong>${title}</strong> se desarrollará en la siguiente fase. Los datos ya están listos.</p>
          </div>
        </div>
      </div>`;
  },

  // ── GLOBAL SEARCH ─────────────────────────────────────────
  initSearch() {
    const input = document.getElementById("global-search");
    if (!input) return;
    let debounce;
    input.addEventListener("input", e => {
      clearTimeout(debounce);
      debounce = setTimeout(() => this.doSearch(e.target.value.trim()), 220);
    });
  },

  doSearch(q) {
    if (!q || q.length < 2) return;
    // Navigate to most relevant page and filter
    const lower = q.toLowerCase();
    const clienteMatch = DB.clientes.find(c => c.nombre.toLowerCase().includes(lower));
    if (clienteMatch) {
      this.navigate("clientes");
      setTimeout(() => Pages.clientes && Pages.clientes.filter(q), 100);
    }
  },

  // ── TOAST NOTIFICATIONS ───────────────────────────────────
  toast(msg, type="success", duration=3500) {
    const icons = { success:"check-circle", error:"x-circle", warning:"alert-triangle", info:"info" };
    const container = document.getElementById("toast-container");
    const el = document.createElement("div");
    el.className = `toast ${type}`;
    el.innerHTML = `${iconSVG(icons[type]||"info")} <span>${msg}</span>`;
    container.appendChild(el);
    setTimeout(() => {
      el.style.opacity = "0";
      el.style.transform = "translateX(20px)";
      el.style.transition = "all 0.3s ease";
      setTimeout(() => el.remove(), 300);
    }, duration);
  },
};

  renderMonthlyChart() {
    const data = DB.mensual;

    const bars = data.map(d => {
      const h = Math.round((d.ingresos / maxVal) * 120);
      const hg = Math.round((d.gastos  / maxVal) * 120);
      const positivo = d.resultado >= 0;
      return `
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1">
          <div style="font-size:10px;font-weight:700;color:${positivo?"var(--green-400)":"var(--red-400)"}">

          <div style="display:flex;align-items:flex-end;gap:3px;height:120px">
            <div style="width:18px;height:${h}px;background:var(--teal-400);border-radius:3px 3px 0 0;opacity:0.9" title="Ingresos ${DB.fmt(d.ingresos)}"></div>
            <div style="width:18px;height:${hg}px;background:var(--red-400);border-radius:3px 3px 0 0;opacity:0.7" title="Gastos ${DB.fmt(d.gastos)}"></div>

      { label:"Resultado neto",  value: DB.fmt(DB.kpis.cobradoYTD - DB.kpis.gastosYTD - DB.kpis.suplidoresPagados + DB.kpis.cobradoYTD - 693015), color:"var(--green-400)" },

    return `

        <div class="card-header">
          <div>
            <div class="card-title">${iconSVG("activity")} Rendimiento mensual 2026</div>

  renderCampTop() {
    const sorted = [...DB.campamentos]
      .filter(c => c.activo && c.pedidos > 0)
      .sort((a,b) => b.pedidos - a.pedidos)
      .slice(0, 8);

    const maxPed = sorted[0]?.pedidos || 1;

    const items = sorted.map((c, i) => `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;${i < sorted.length-1?"border-bottom:1px solid var(--border)":""}">
        <div style="width:22px;height:22px;border-radius:50%;background:var(--teal-50);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--teal-600);flex-shrink:0">${i+1}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12.5px;font-weight:600;color:var(--ink-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.nombre}</div>
          <div class="progress-bar" style="margin-top:4px;height:4px">
            <div class="progress-fill" style="width:${Math.round(c.pedidos/maxPed*100)}%"></div>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:13px;font-weight:700;color:var(--ink-800)">${c.pedidos}</div>
          <div style="font-size:10px;color:var(--ink-400)">pedidos</div>
        </div>
      </div>`).join("");

    // Pipeline summary
    const byStage = {};
    DB.pipeline.forEach(l => { byStage[l.estado] = (byStage[l.estado]||0) + 1; });
    const stageColors = { Consulta:"var(--ink-400)", Cotizado:"var(--teal-400)", Seguimiento:"var(--amber-400)", Confirmado:"var(--green-400)", Completado:"var(--green-500)" };

    const pipeItems = Object.entries(byStage).map(([e,n]) => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:7px">
          <div style="width:7px;height:7px;border-radius:50%;background:${stageColors[e]||"var(--ink-300)"}"></div>
          <span style="font-size:12.5px;color:var(--ink-700)">${e}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;font-weight:700;color:var(--ink-800)">${n}</span>
          <span style="font-size:11px;color:var(--ink-400)">lead${n>1?"s":""}</span>
        </div>
      </div>`).join("");

    return `
      <div style="display:flex;flex-direction:column;gap:20px">
        <div class="card">
          <div class="card-header">
            <div class="card-title">${iconSVG("map-pin")} Top campamentos</div>
            <button class="btn btn-ghost btn-sm" onclick="App.navigate('campamentos')">Ver todos</button>
          </div>
          <div class="card-body" style="padding:12px 20px">${items}</div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">${iconSVG("target")} Pipeline comercial</div>
            <button class="btn btn-ghost btn-sm" onclick="App.navigate('leads')">Gestionar</button>
          </div>
          <div class="card-body" style="padding:12px 20px">
            ${pipeItems}
            <div style="margin-top:14px;padding:12px;background:var(--teal-50);border-radius:var(--radius-sm);border:1px solid var(--teal-100)">
              <div style="font-size:11px;color:var(--teal-600);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Valor total pipeline</div>
              <div style="font-size:20px;font-weight:800;color:var(--teal-600);font-family:var(--font-display)">
                ${DB.fmt(DB.pipeline.filter(l=>l.monto>0).reduce((s,l)=>s+l.monto,0))}
              </div>
            </div>
          </div>
        </div>
      </div>`;
  },

  initCharts() {
    // Charts are pure CSS/HTML — no library needed
  },
};

              </div>
            </div>
            <button class="modal-close" onclick="this.closest('.modal-backdrop').remove()">${iconSVG("x")}</button>
          </div>
          <div class="modal-body">

              <div style="background:var(--teal-50);border-radius:8px;padding:14px;text-align:center">
                <div style="font-size:10px;color:var(--teal-600);font-weight:700;text-transform:uppercase">Valor estimado</div>
                <div style="font-size:24px;font-weight:800;color:var(--teal-600);font-family:var(--font-display)">${l.monto?DB.fmt(l.monto):"Por cotizar"}</div>
              </div>
              <div style="background:var(--ink-50);border-radius:8px;padding:14px;text-align:center">
                <div style="font-size:10px;color:var(--ink-500);font-weight:700;text-transform:uppercase">Noches</div>

              </div>
            </div>

              <label class="form-label">Mover a etapa</label>

                ${["Consulta","Cotizado","Seguimiento","Confirmado","Completado","Perdido"].map(s=>`

            </button>

              ${iconSVG("file-text")} Crear cotización
            </button>

          </div>
        </div>
      </div>`;
  },

  changeStage(id, newStage, btn) {
    const l = DB.pipeline.find(x=>x.id===id);
    if (l) {
      l.estado = newStage;
      App.toast(`Lead movido a <strong>${newStage}</strong>`, "success");
      btn.closest(".modal-backdrop").remove();
      this.render(document.getElementById("main-content"));

  },

  sendWA(id) {
    const l = DB.pipeline.find(x=>x.id===id);

    const c = DB.clientes.find(x=>x.id===l.clienteId);
    const tel = c?.tel?.replace(/\D/g,"");

    const msg = encodeURIComponent(`Hola ${l.cliente.split(" ")[0]}! 👋\n\nTe escribimos de CAMPEACH RD para darle seguimiento a tu consulta sobre *${l.campamento}*.\n\n¿Sigues interesado/a? Con gusto te ayudo a confirmar tu reserva 🏕️🌿`);
    window.open(`https://wa.me/1${tel}?text=${msg}`, "_blank");
  },

  newLead() {
    App.toast("Formulario nuevo lead — próxima fase","info");
  },
};

// ============================================================
// CAMPEACH RD — COTIZACIONES PAGE
// Fase 1 · Formulario + Preview WA + Historial
// ============================================================

Pages.cotizaciones = {

  // Cotización en construcción
  draft: {
    cliente: "", tel: "", email: "",
    campamento: "", servicio: "",
    fechaEvento: "", fechaSalida: "",
    adultos: 2, ninos: 0, noches: 1,
    mascotas: false, notas: "",
    lineas: [
      { desc: "", cant: 1, dias: 1, precio: 0, deposito: 0 }
    ],
  },

  render(container) {
    container.innerHTML = `
      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-header-title">Cotizaciones</h1>
          <p class="page-header-sub">Genera y envía cotizaciones en segundos · con mensaje de WhatsApp automático</p>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-secondary btn-sm" onclick="Pages.cotizaciones.viewHistorial()">
            ${iconSVG("layers")} Historial
          </button>
          <button class="btn btn-primary btn-sm" onclick="Pages.cotizaciones.openNew()">
            ${iconSVG("plus")} Nueva cotización
          </button>
        </div>
      </div>

      <div class="grid-6-4" id="cot-main">
        ${this.renderForm()}
        ${this.renderPreview()}
      </div>

      <div class="mb-24" id="cot-historial-section" style="display:none">
        ${this.renderHistorial()}
      </div>

      <div id="cot-modal"></div>`;

    this.bindFormEvents();
    this.updatePreview();
  },

  renderForm() {
    const campOptions = DB.campamentos
      .filter(c=>c.activo)
      .sort((a,b)=>a.nombre.localeCompare(b.nombre))
      .map(c=>`<option value="${c.id}" data-precio="${c.precio_base||0}">${c.nombre}</option>`)
      .join("");

    return `
      <div class="card" id="cot-form-card">
        <div class="card-header">
          <div class="card-title">${iconSVG("file-text")} Nueva cotización</div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-ghost btn-sm" onclick="Pages.cotizaciones.clearDraft()">Limpiar</button>
            <button class="btn btn-secondary btn-sm" onclick="Pages.cotizaciones.saveDraft()">
              ${iconSVG("download")} Guardar
            </button>
          </div>
        </div>
        <div class="card-body">

          <!-- CLIENTE -->
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-400);margin-bottom:10px">Cliente</div>
          <div class="form-grid form-grid-2 mb-16">
            <div class="form-group">
              <label class="form-label">Nombre del cliente <span class="required">*</span></label>
              <div class="input-wrap">${iconSVG("users")}
                <input class="form-input" id="cot-nombre" placeholder="Buscar o escribir…"
                  list="cl-datalist" oninput="Pages.cotizaciones.onClienteChange(this.value)" value="${this.draft.cliente}">
                <datalist id="cl-datalist">
                  ${DB.clientes.map(c=>`<option value="${c.nombre}" data-tel="${c.tel}" data-email="${c.email}">`).join("")}
                </datalist>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Teléfono / WhatsApp</label>
              <div class="input-wrap">${iconSVG("phone")}
                <input class="form-input" id="cot-tel" placeholder="809-000-0000" value="${this.draft.tel}">
              </div>
            </div>
          </div>

          <!-- CAMPAMENTO -->
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-400);margin-bottom:10px">Destino</div>
          <div class="form-grid form-grid-2 mb-16">
            <div class="form-group">
              <label class="form-label">Campamento <span class="required">*</span></label>
              <div class="input-wrap">${iconSVG("map-pin")}
                <select class="form-input" id="cot-camp" onchange="Pages.cotizaciones.onCampChange(this)">
                  <option value="">— Seleccionar —</option>
                  ${campOptions}
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Servicio / Modalidad</label>
              <input class="form-input" id="cot-servicio" placeholder="Camping, Glamping, Cabaña…" value="${this.draft.servicio}" oninput="Pages.cotizaciones.updatePreview()">
            </div>
          </div>

          <!-- FECHAS -->
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-400);margin-bottom:10px">Fechas y personas</div>
          <div class="form-grid form-grid-2 mb-16">
            <div class="form-group">
              <label class="form-label">Fecha del evento</label>
              <div class="input-wrap">${iconSVG("calendar")}
                <input type="date" class="form-input" id="cot-fecha" value="${this.draft.fechaEvento}" onchange="Pages.cotizaciones.onFechaChange()">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Fecha de salida</label>
              <div class="input-wrap">${iconSVG("calendar")}
                <input type="date" class="form-input" id="cot-salida" value="${this.draft.fechaSalida}" onchange="Pages.cotizaciones.onFechaChange()">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Adultos</label>
              <input type="number" class="form-input" id="cot-adultos" min="1" value="${this.draft.adultos}" oninput="Pages.cotizaciones.updateFromForm()">
            </div>
            <div class="form-group">
              <label class="form-label">Niños (3-12 años)</label>
              <input type="number" class="form-input" id="cot-ninos" min="0" value="${this.draft.ninos}" oninput="Pages.cotizaciones.updateFromForm()">
            </div>
          </div>

          <!-- LÍNEAS DE COTIZACIÓN -->
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-400);margin-bottom:10px">
            Detalle de servicios y equipos
          </div>

          <div id="cot-lineas">
            ${this.renderLineas()}
          </div>

          <button class="btn btn-ghost btn-sm mb-16" onclick="Pages.cotizaciones.addLinea()">
            ${iconSVG("plus")} Agregar línea
          </button>

          <!-- NOTAS -->
          <div class="form-group mb-16">
            <label class="form-label">Notas adicionales</label>
            <textarea class="form-textarea" id="cot-notas" placeholder="Condiciones especiales, restricciones, información del campamento…" style="min-height:60px" oninput="Pages.cotizaciones.updateFromForm()">${this.draft.notas}</textarea>
          </div>

          <!-- TOTALES -->
          <div style="background:var(--teal-50);border-radius:var(--radius-sm);padding:14px;border:1px solid var(--teal-100)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <span style="font-size:12px;color:var(--teal-600)">Subtotal servicios</span>
              <span id="cot-subtotal" style="font-size:14px;font-weight:700;color:var(--teal-600)">RD$0</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <span style="font-size:12px;color:var(--ink-400)">Depósito reembolsable</span>
              <span id="cot-deposito-total" style="font-size:13px;color:var(--amber-500);font-weight:600">RD$0</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--teal-200);padding-top:8px">
              <span style="font-size:14px;font-weight:700;color:var(--teal-700)">TOTAL A COBRAR</span>
              <span id="cot-total-display" style="font-size:22px;font-weight:800;color:var(--teal-600);font-family:var(--font-display)">RD$0</span>
            </div>
          </div>
        </div>

        <div class="card-footer" style="display:flex;gap:8px">
          <button class="btn btn-wa" style="flex:1" onclick="Pages.cotizaciones.sendWA()">
            ${iconSVG("whatsapp")} Enviar por WhatsApp
          </button>
          <button class="btn btn-pdf" onclick="Pages.cotizaciones.printPDF()">
            ${iconSVG("pdf")} PDF
          </button>
          <button class="btn btn-primary" onclick="Pages.cotizaciones.confirmReserva()">
            ${iconSVG("check")} Confirmar
          </button>
        </div>
      </div>`;
  },

  renderLineas() {
    return this.draft.lineas.map((l, i) => `
      <div class="cot-line" id="cot-linea-${i}">
        <div>
          <input class="form-input" placeholder="Descripción del servicio o equipo" value="${l.desc}"
            oninput="Pages.cotizaciones.updateLinea(${i},'desc',this.value)" style="font-size:12.5px">
        </div>
        <div>
          <input type="number" class="form-input" placeholder="Cant." min="1" value="${l.cant||1}"
            oninput="Pages.cotizaciones.updateLinea(${i},'cant',+this.value)" style="text-align:center;font-size:12.5px">
        </div>
        <div>
          <input type="number" class="form-input" placeholder="Días" min="1" value="${l.dias||1}"
            oninput="Pages.cotizaciones.updateLinea(${i},'dias',+this.value)" style="text-align:center;font-size:12.5px">
        </div>
        <div>
          <input type="number" class="form-input" placeholder="Precio unit." min="0" value="${l.precio||""}"
            oninput="Pages.cotizaciones.updateLinea(${i},'precio',+this.value)" style="text-align:right;font-size:12.5px">
        </div>
        <div style="background:var(--teal-50);border:1px solid var(--teal-100);border-radius:var(--radius-sm);padding:8px 10px;text-align:right;font-size:12.5px;font-weight:700;color:var(--teal-600)" id="cot-sub-${i}">
          ${this.fmtLinea(l)}
        </div>
        <button class="btn btn-ghost btn-sm btn-icon" ${this.draft.lineas.length<=1?"disabled":""} onclick="Pages.cotizaciones.removeLinea(${i})" style="color:var(--red-400)">
          ${iconSVG("x","",14)}
        </button>
      </div>`).join("");
  },

  renderPreview() {
    return `
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="card">
          <div class="card-header">
            <div class="card-title">${iconSVG("whatsapp")} Preview mensaje WhatsApp</div>
            <button class="btn btn-ghost btn-sm btn-icon" onclick="Pages.cotizaciones.copyWA()" data-tooltip="Copiar mensaje">
              ${iconSVG("copy")}
            </button>
          </div>
          <div class="card-body" style="padding:0">
            <div class="wa-header">
              <div style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center">
                ${iconSVG("tent","",16)}
              </div>
              <div>
                <div style="font-size:13px;font-weight:600">CAMPEACH RD</div>
                <div style="font-size:10px;opacity:.7">campingsrd@gmail.com</div>
              </div>
            </div>
            <div class="wa-wrapper">
              <div class="wa-preview" id="wa-preview-text">Completa el formulario para generar el mensaje…</div>
            </div>
            <div style="padding:12px 16px;display:flex;gap:8px">
              <button class="btn btn-wa" style="flex:1" onclick="Pages.cotizaciones.sendWA()">
                ${iconSVG("send")} Enviar ahora
              </button>
              <button class="btn btn-secondary btn-sm" onclick="Pages.cotizaciones.copyWA()">
                ${iconSVG("copy")} Copiar
              </button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">${iconSVG("layers")} Cotizaciones recientes</div>
          </div>
          <div class="card-body" style="padding:0">
            ${DB.cotizaciones.map(q=>`
              <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border)">
                <div>
                  <div style="font-size:12.5px;font-weight:600">${q.cliente}</div>
                  <div style="font-size:11px;color:var(--teal-500)">${q.campamento}</div>
                </div>
                <div style="text-align:right">
                  <div style="font-size:13px;font-weight:700">${DB.fmt(q.total)}</div>
                  <span class="badge ${DB.estadoBadge(q.estado)}" style="font-size:10px">${q.estado}</span>
                </div>
              </div>`).join("")}
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">${iconSVG("credit-card")} Cuentas de cobro</div>
          </div>
          <div class="card-body" style="padding:12px 16px">
            ${DB.empresa.cuentas.map(c=>`
              <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">
                <div style="font-size:12px;font-weight:600;color:var(--ink-700)">${c.banco}</div>
                <div style="font-size:12px;font-weight:700;font-family:monospace;color:var(--teal-600)">${c.numero}</div>
              </div>`).join("")}
            <div style="font-size:11px;color:var(--ink-400);margin-top:8px">A nombre de: <strong>${DB.empresa.cuentas[0].titular}</strong></div>
          </div>
        </div>
      </div>`;
  },

  renderHistorial() {
    return `
      <div class="card">
        <div class="card-header">
          <div class="card-title">${iconSVG("layers")} Historial de cotizaciones</div>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('cot-historial-section').style.display='none'">Ocultar</button>
        </div>
        <div class="table-wrap" style="border:none;border-radius:0;box-shadow:none">
          <table class="data-table">
            <thead>
              <tr><th>Nº</th><th>Cliente</th><th>Campamento</th><th>Total</th><th>Estado</th><th>Fecha</th><th></th></tr>
            </thead>
            <tbody>
              ${DB.cotizaciones.map(q=>`
                <tr>
                  <td class="td-main">${q.num}</td>
                  <td>
                    <div class="td-main">${q.cliente}</div>
                    <div class="td-sub">${q.adultos}p · ${q.noches}n</div>
                  </td>
                  <td>${q.campamento}</td>
                  <td class="td-main">${DB.fmt(q.total)}</td>
                  <td><span class="badge ${DB.estadoBadge(q.estado)}">${q.estado}</span></td>
                  <td style="font-size:12px;color:var(--ink-400)">${DB.fmtDate(q.fecha)}</td>
                  <td>
                    <div style="display:flex;gap:4px">
                      <button class="btn btn-wa btn-sm btn-icon">${iconSVG("whatsapp","",13)}</button>
                      <button class="btn btn-primary btn-sm">Convertir</button>
                    </div>
                  </td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>
      </div>`;
  },

  // ── FORM LOGIC ──────────────────────────────────────────────
  bindFormEvents() {},

  onClienteChange(value) {
    this.draft.cliente = value;
    const found = DB.clientes.find(c=>c.nombre===value);
    if (found) {
      const telEl = document.getElementById("cot-tel");
      if (telEl && found.tel) telEl.value = found.tel;
      this.draft.tel = found.tel || "";
      this.draft.email = found.email || "";
    }
    this.updatePreview();
  },

  onCampChange(sel) {
    const opt = sel.selectedOptions[0];
    const precio = parseInt(opt?.dataset.precio)||0;
    this.draft.campamento = sel.selectedOptions[0]?.text || "";
    // Auto-fill precio in first linea if empty
    if (precio && !this.draft.lineas[0].precio) {
      this.draft.lineas[0].precio = precio;
      this.draft.lineas[0].desc = "Entrada camping adulto";
      this.draft.lineas[0].cant = this.draft.adultos;
      document.getElementById("cot-lineas").innerHTML = this.renderLineas();
    }
    this.updatePreview();
  },

  onFechaChange() {
    const fi = document.getElementById("cot-fecha")?.value;
    const fo = document.getElementById("cot-salida")?.value;
    this.draft.fechaEvento = fi||"";
    this.draft.fechaSalida = fo||"";
    if (fi && fo) {
      const d1 = new Date(fi), d2 = new Date(fo);
      const noches = Math.max(1, Math.round((d2-d1)/(1000*60*60*24)));
      this.draft.noches = noches;
      // Update días in lineas
      this.draft.lineas = this.draft.lineas.map(l=>({...l, dias:noches}));
      document.getElementById("cot-lineas").innerHTML = this.renderLineas();
    }
    this.updatePreview();
  },

  updateFromForm() {
    this.draft.adultos = parseInt(document.getElementById("cot-adultos")?.value)||2;
    this.draft.ninos   = parseInt(document.getElementById("cot-ninos")?.value)||0;
    this.draft.notas   = document.getElementById("cot-notas")?.value||"";
    this.updatePreview();
  },

  updateLinea(i, field, value) {
    this.draft.lineas[i][field] = value;
    const sub = document.getElementById(`cot-sub-${i}`);
    if (sub) sub.textContent = this.fmtLinea(this.draft.lineas[i]);
    this.updateTotals();
    this.updatePreview();
  },

  addLinea() {
    this.draft.lineas.push({ desc:"", cant:1, dias: this.draft.noches||1, precio:0, deposito:0 });
    document.getElementById("cot-lineas").innerHTML = this.renderLineas();
    this.updateTotals();
  },

  removeLinea(i) {
    if (this.draft.lineas.length <= 1) return;
    this.draft.lineas.splice(i, 1);
    document.getElementById("cot-lineas").innerHTML = this.renderLineas();
    this.updateTotals();
    this.updatePreview();
  },

  fmtLinea(l) {
    const sub = (l.cant||0) * (l.dias||1) * (l.precio||0);
    return sub > 0 ? "RD$"+sub.toLocaleString("es-DO") : "—";
  },

  getTotal() {
    return this.draft.lineas.reduce((s,l)=>s+(l.cant||1)*(l.dias||1)*(l.precio||0),0);
  },

  getTotalDeposito() {
    return this.draft.lineas.reduce((s,l)=>s+(l.deposito||0),0);
  },

  updateTotals() {
    const total = this.getTotal();
    const dep   = this.getTotalDeposito();
    const sEl = document.getElementById("cot-subtotal");
    const dEl = document.getElementById("cot-deposito-total");
    const tEl = document.getElementById("cot-total-display");
    if (sEl) sEl.textContent = DB.fmt(total);
    if (dEl) dEl.textContent = dep > 0 ? DB.fmt(dep) : "—";
    if (tEl) tEl.textContent = DB.fmt(total);
  },

  updatePreview() {
    this.updateTotals();
    const preview = document.getElementById("wa-preview-text");
    if (!preview) return;

    const nombre  = (document.getElementById("cot-nombre")?.value || this.draft.cliente || "").split(" ")[0] || "Cliente";
    const camp    = this.draft.campamento || document.getElementById("cot-camp")?.selectedOptions[0]?.text || "";
    const servicio= document.getElementById("cot-servicio")?.value || "";
    const adultos = parseInt(document.getElementById("cot-adultos")?.value)||2;
    const ninos   = parseInt(document.getElementById("cot-ninos")?.value)||0;
    const fecha   = this.draft.fechaEvento;
    const noches  = this.draft.noches||1;
    const total   = this.getTotal();
    const dep     = this.getTotalDeposito();
    const notas   = document.getElementById("cot-notas")?.value||"";

    if (!camp && !total) {
      preview.textContent = "Completa el formulario para generar el mensaje…";
      return;
    }

    let fechaStr = "";
    if (fecha) {
      const dt = new Date(fecha+"T00:00:00");
      fechaStr = dt.toLocaleDateString("es-DO",{day:"2-digit",month:"long",year:"numeric"});
    }

    const lineasStr = this.draft.lineas
      .filter(l=>l.desc&&l.precio>0)
      .map(l=>`  • ${l.desc}: ${DB.fmt((l.cant||1)*(l.dias||1)*(l.precio||0))}`)
      .join("\n");

    const msg = [
      `¡Hola ${nombre}! 😊`,
      "",
      `Te tengo lista tu cotización para *${camp || "[Campamento]"}* 🏕️`,
      "",
      `📋 *Resumen:*`,
      `👥 ${adultos} adulto${adultos>1?"s":""}${ninos>0?` + ${ninos} niño${ninos>1?"s":""}`:""}`,
      fechaStr ? `📅 Fecha: ${fechaStr}` : null,
      noches>1 ? `🌙 ${noches} noche${noches>1?"s":""}` : null,
      servicio ? `✨ Modalidad: ${servicio}` : null,
      lineasStr ? `\n*Detalle:*\n${lineasStr}` : null,
      "",
      total > 0 ? `💰 *Total: ${DB.fmt(total)}*` : null,
      dep > 0 ? `🔒 Depósito reembolsable: ${DB.fmt(dep)}` : null,
      "",
      `💳 *Transferencia a:*`,
      `🏦 Banco Popular 817906308`,
      `🏦 Banreservas 9600465807`,
      `A nombre de: Katherine Mella`,
      "",
      notas ? `📌 ${notas}\n` : null,
      `✅ Envíanos el comprobante y confirmamos tu reserva. ¡Te esperamos pronto! 🌿`,
    ].filter(l=>l!==null).join("\n");

    preview.textContent = msg;
    this.draft._wa_msg = msg;
  },

  copyWA() {
    const msg = this.draft._wa_msg || document.getElementById("wa-preview-text")?.textContent;
    if (!msg || msg.includes("Completa")) return App.toast("Genera el mensaje primero","warning");
    navigator.clipboard.writeText(msg).then(()=>App.toast("Mensaje copiado al portapapeles","success")).catch(()=>{
      const ta=document.createElement("textarea");ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
      App.toast("Mensaje copiado","success");
    });
  },

  sendWA() {
    this.updatePreview();
    const tel = (document.getElementById("cot-tel")?.value||"").replace(/\D/g,"");
    const msg = this.draft._wa_msg || document.getElementById("wa-preview-text")?.textContent;
    if (!msg || msg.includes("Completa")) return App.toast("Completa el formulario primero","warning");
    if (tel) {
      window.open(`https://wa.me/1${tel}?text=${encodeURIComponent(msg)}`, "_blank");
    } else {
      this.copyWA();
      App.toast("Sin teléfono — mensaje copiado. Pégalo en WhatsApp manual","warning",5000);
    }
  },

  confirmReserva() {
    const nombre = document.getElementById("cot-nombre")?.value;
    const camp = this.draft.campamento;
    const total = this.getTotal();
    if (!nombre || !camp || !total) return App.toast("Completa los campos obligatorios","warning");
    App.toast(`Reserva de <strong>${nombre}</strong> creada por ${DB.fmt(total)}`,"success");
    this.clearDraft();
  },

  printPDF() {
    App.toast("Generación de PDF — próxima fase","info");
  },

  clearDraft() {
    this.draft = { cliente:"",tel:"",email:"",campamento:"",servicio:"",fechaEvento:"",fechaSalida:"",adultos:2,ninos:0,noches:1,mascotas:false,notas:"", lineas:[{desc:"",cant:1,dias:1,precio:0,deposito:0}] };
    this.render(document.getElementById("main-content"));
  },

  saveDraft() {
    App.toast("Borrador guardado","success");
  },

  viewHistorial() {
    const s = document.getElementById("cot-historial-section");
    if (s) s.style.display = s.style.display==="none" ? "block" : "none";
  },

  openNew() {
    // Focus on nombre field
    document.getElementById("cot-nombre")?.focus();

  calcAlquiler() {
    const sel = document.getElementById("al-equipo");
    const opt = sel?.selectedOptions[0];
    const precio  = parseFloat(opt?.dataset.precio||0);
    const deposito= parseFloat(opt?.dataset.dep||0);
    const cant    = parseInt(document.getElementById("al-cant")?.value||1);
    const fi = document.getElementById("al-salida")?.value;
    const fo = document.getElementById("al-retorno")?.value;
    let noches = 1;
    if (fi && fo) {
      const d1=new Date(fi), d2=new Date(fo);
      noches = Math.max(1, Math.round((d2-d1)/(1000*60*60*24)));
    }
    const total = precio * cant * noches;
    const dep   = deposito * cant;
    const nEl = document.getElementById("al-noches");
    const tEl = document.getElementById("al-total");
    const dEl = document.getElementById("al-deposito");
    if (nEl) nEl.textContent = noches + " noche" + (noches>1?"s":"");
    if (tEl) tEl.textContent = total > 0 ? DB.fmt(total) : "—";
    if (dEl) dEl.textContent = dep > 0 ? DB.fmt(dep) : "—";
  },

    const cliente = document.getElementById("al-cliente")?.value||"Cliente";

                <select class="form-input" id="ng-cat">
                  <option value="">— Seleccionar —</option>
                  ${cats.map(c=>`<option>${c}</option>`).join("")}
                </select>
              </div>
              <div class="form-group" style="grid-column:1/-1">
                <label class="form-label">Descripción <span class="required">*</span></label>
                <input class="form-input" id="ng-desc" placeholder="Ej: Facebook Ads Abril">
              </div>
              <div class="form-group">
                <label class="form-label">Proveedor</label>
                <input class="form-input" id="ng-prov" placeholder="Meta Ads, ManyChat…">
              </div>
              <div class="form-group">
                <label class="form-label">Monto RD$ <span class="required">*</span></label>
                <div class="input-wrap">${iconSVG("dollar-sign")}
                  <input type="number" class="form-input" id="ng-monto" placeholder="0.00" min="0">
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-primary" onclick="Pages.gastos.guardarGasto()">
              ${iconSVG("check")} Guardar gasto
            </button>
            <button class="btn btn-secondary" onclick="this.closest('.modal-backdrop').remove()">Cancelar</button>
          </div>
        </div>
      </div>`;
    document.getElementById("ng-fecha").value = new Date().toISOString().split("T")[0];
  },

  guardarGasto() {
    const desc  = document.getElementById("ng-desc")?.value;
    const cat   = document.getElementById("ng-cat")?.value;
    const monto = parseFloat(document.getElementById("ng-monto")?.value||0);
    if (!desc || !cat || !monto) return App.toast("Completa los campos obligatorios","warning");
    const mes = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][new Date().getMonth()];
    const newG = {
      id: "G"+String(DB.gastos.length+1).padStart(3,"0"),
      fecha: document.getElementById("ng-fecha")?.value || new Date().toISOString().split("T")[0],
      cat, desc,
      proveedor: document.getElementById("ng-prov")?.value||"—",
      monto, mes
    };
    DB.gastos.unshift(newG);
    App.toast(`Gasto de ${DB.fmt(monto)} registrado en ${cat}`,"success");
    document.querySelector("#gasto-modal .modal-backdrop")?.remove();
    Pages.gastos.render(document.getElementById("main-content"));
  },
};
